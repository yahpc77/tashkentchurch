<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⛪ 교육부서 출석 마스터 V7 (교사 완벽분리)</title>
    <link rel="manifest" href="manifest_child.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .member-btn { transition: transform 0.1s ease; border-radius: 0.5rem; padding-top: 0.65rem; padding-bottom: 0.65rem; font-size: 14.5px; font-weight: 900; letter-spacing: -0.5px; cursor: pointer; }
        .member-btn:active { transform: scale(0.92); }
        .status-absent { background-color: #ffffff; color: #475569; border: 1.5px solid #cbd5e1; }
        .status-present { background-color: #2563eb; color: white; border: 1.5px solid #1e3a8a; box-shadow: 0 4px 6px rgba(37,99,235,0.3); }
        .status-visitor { background-color: #ea580c; color: white; border: 1.5px solid #9a3412; }
        .add-btn { background-color: #eff6ff; color: #3b82f6; border: 2px dashed #93c5fd; font-size: 20px !important; }
        
        @media (min-width: 768px) {
            .member-btn { font-size: 20px; padding-top: 1.25rem; padding-bottom: 1.25rem; }
            .add-btn { font-size: 26px !important; }
            #search-input { font-size: 24px; padding: 1.25rem; }
            .section-title { font-size: 22px; }
        }
        
        .highlight-search { animation: pulse-border 1.2s infinite; background-color: #fef08a !important; color: #b45309 !important; border: 2.5px solid #ea580c !important; transform: scale(1.05) !important; z-index: 10 !important; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(234, 88, 12, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0); } }
        
        #report-modal, #absentee-modal, #report-view { display: none; }
        
        #report-container { width: 100%; display: flex; justify-content: center; overflow-x: hidden; background: #e5e7eb; padding: 20px 0; }
        .a4-page { width: 794px !important; min-width: 794px !important; max-width: 794px !important; min-height: 1123px; background: white; padding: 40px 50px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.15); margin: 0 auto; transform-origin: top center; }
        
        .dense-table th, .dense-table td { padding: 8px 6px; border-bottom: 1px solid #cbd5e1; word-break: keep-all; text-align: center; }
        .dense-table th { background-color: #f1f5f9; color: #334155; font-weight: 900; border-top: 2px solid #1e3a8a; border-bottom: 2px solid #cbd5e1; }
        .dense-table tr:last-child td { border-bottom: 2px solid #1e3a8a; }
        
        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            #main-app, #report-modal, #absentee-modal, .no-print { display: none !important; }
            #report-view { display: block !important; padding: 0; background: white; }
            #report-container { height: auto !important; padding: 0; background: white; }
            .a4-page { box-shadow: none; width: 100% !important; max-width: 100% !important; padding: 10mm; transform: none !important; margin: 0 !important; }
        }
    </style>
</head>
<body class="pb-28 text-slate-800">

    <div id="main-app">
        <div class="bg-white shadow-sm px-3 py-3 border-b-4 border-indigo-700">
            <div class="flex justify-between items-center mb-3">
                <h1 id="app-title" class="text-lg font-black text-indigo-900 tracking-tight section-title">⛪ 부서명 로딩중</h1>
                <input type="date" id="today-date" class="text-sm font-bold text-gray-700 bg-gray-100 px-2 py-1 rounded border border-gray-300 outline-none">
            </div>

            <div class="bg-orange-50 p-2 rounded-xl border border-orange-200 mb-3 flex gap-2">
                <button onclick="addVisitor(true)" class="flex-1 bg-orange-500 text-white py-2 rounded-lg font-black text-sm shadow active:scale-95 transition-transform">🆕 첫 방문자(보고⭕)</button>
                <button onclick="addVisitor(false)" class="flex-1 bg-slate-500 text-white py-2 rounded-lg font-black text-sm shadow active:scale-95 transition-transform">🔄 계속 방문(보고❌)</button>
            </div>

            <div>
                <input type="text" id="search-input" onkeyup="filterMembers()" class="w-full border-2 border-indigo-400 rounded-xl p-3.5 text-lg font-black shadow-sm focus:outline-none focus:border-indigo-600 text-center text-indigo-900 placeholder-indigo-300" placeholder="🔍 이름 검색 (+버튼으로 추가)">
            </div>
            <p id="db-status" class="text-[11px] font-bold text-orange-500 mt-2 text-center">🟡 서버 연결 시도 중...</p>
        </div>

        <div id="members-container" class="p-2 space-y-3 bg-slate-50"></div>

        <div class="fixed bottom-0 left-0 w-full bg-white border-t-2 border-slate-200 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-40 flex justify-between items-center shrink-0 pb-6">
            <div class="pl-2 leading-none flex-1">
                <p class="text-xs font-bold text-gray-500 mb-1">현재 출석 <span class="text-[10px] font-normal text-blue-600">(학생만)</span></p>
                <p class="text-3xl font-black text-indigo-700"><span id="count-display">0</span><span class="text-sm text-gray-600 font-bold ml-1">명</span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="submitReportDetails()" class="bg-indigo-800 text-white px-4 py-3 rounded-xl font-black text-sm shadow-lg active:scale-95 transition-transform section-title">💾 최종마감</button>
                <button onclick="openReportCenter()" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-black text-sm shadow-lg active:scale-95 transition-transform section-title">📑 보고서 작성</button>
            </div>
        </div>
    </div>

    <div id="report-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl border-t-8 border-indigo-600 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-black text-indigo-900 tracking-tight">🗂️ 보고서 센터</h2><button onclick="closeReportCenter()" class="text-gray-400 font-bold text-xl">&times;</button></div>
            <div class="space-y-2 mb-6 bg-slate-50 p-3 rounded-lg border border-slate-200">
                <input type="text" id="rep-preacher" placeholder="인도 (예: 장주원 간사)" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <input type="text" id="rep-scripture" placeholder="본문 (예: 롬 8장 2절)" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <input type="text" id="rep-title" placeholder="제목 (예: 나의 가장 친한친구)" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
            </div>
            <button onclick="openAbsenteeModal()" class="w-full bg-orange-100 text-orange-700 border border-orange-300 py-3 rounded-xl font-black text-sm mb-6 active:scale-95 flex justify-between px-4 items-center transition-transform"><span>✍️ 결석자 사유 / 특이사항 입력</span><span id="absentee-count-badge" class="bg-orange-500 text-white px-2 py-0.5 rounded-full text-xs">0명 완료</span></button>
            <button onclick="generateA4Report()" class="w-full bg-indigo-700 text-white py-4 rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform text-center">🚀 V7 예배 보고서(PDF) 생성</button>
        </div>
    </div>

    <div id="absentee-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-5 shadow-2xl flex flex-col h-[80vh]">
            <div class="flex justify-between items-center mb-3"><h2 class="text-lg font-black text-orange-700">✍️ 결석 사유 입력</h2><button onclick="closeAbsenteeModal()" class="text-gray-500 font-bold bg-gray-100 px-3 py-1 rounded-lg text-sm">완료</button></div>
            <div id="absentee-list-container" class="overflow-y-auto flex-1 space-y-2 bg-slate-50 p-2 rounded-lg border border-slate-200"></div>
        </div>
    </div>

    <div id="report-view" class="bg-gray-200 min-h-screen w-full overflow-y-auto overflow-x-hidden">
        <div class="text-center py-6 no-print flex gap-3 justify-center w-full px-4 bg-slate-800 shadow-md">
            <button onclick="closeReportView()" class="flex-1 max-w-[200px] bg-slate-600 text-white py-3 rounded-xl font-black shadow-lg active:scale-95 transition-transform text-lg border border-slate-500">🔙 뒤로가기</button>
            <button onclick="window.print()" class="flex-1 max-w-[200px] bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg active:scale-95 transition-transform text-lg">🖨️ PDF 저장</button>
        </div>
        <div id="report-container">
            <div class="a4-page relative" id="a4-content"></div>
        </div>
    </div>

    <script>
        // 🚨 [필요한 부서명으로 바꾸세요: 유초등부, 중고등부, 유아부]
        const DEPT_NAME = "유초등부"; 

        const firebaseConfig = { databaseURL: "https://tashkent-church-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        let allMembersObj = {}; let presentSet = new Set();
        let visitorsNew = []; let visitorsRecurring = []; let absenteeReasons = {}; 
        let currentReportDetails = {}; 
        let teacherSet = new Set(); // 교사 명단 추적용 세트

        // 🚨 폴더명 자동 분해 마법 (유초등부_6학년_김희란 -> 반: 6학년, 교사: 김희란)
        function parseGroupInfo(groupKey) {
            const prefix = DEPT_NAME + "_"; if (!groupKey.startsWith(prefix)) return null;
            const rest = groupKey.substring(prefix.length); 
            const parts = rest.split('_');
            const className = parts[0] || '';
            const teacherName = parts.length > 1 ? parts[1].trim() : '';
            return { className, teacherName }; 
        }

        function initApp() {
            document.getElementById('app-title').innerText = `⛪ ${DEPT_NAME} 출석부 V7`;
            document.getElementById('today-date').value = new Date().toISOString().split('T')[0];
            
            db.ref('members').on('value', (snap) => {
                const data = snap.val() || {}; let processed = {};
                for(let k in data) { 
                    if(k.startsWith(DEPT_NAME + "_")) { 
                        let membersArray = data[k] ? (Array.isArray(data[k]) ? data[k] : Object.values(data[k])) : [];
                        processed[k] = membersArray.sort((a, b) => a.localeCompare(b));
                    } 
                }
                allMembersObj = processed;
                checkServerStatus();
                startAttendanceSync(); 
            });
            document.getElementById('today-date').addEventListener('change', startAttendanceSync);
        }

        function startAttendanceSync() {
            const dateStr = document.getElementById('today-date').value;
            const path = `attendance/${dateStr}/${DEPT_NAME}`;
            
            db.ref(path).off(); db.ref(`attendance/${dateStr}/report_details_${DEPT_NAME}`).off();

            db.ref(path).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                presentSet.clear(); visitorsNew = []; visitorsRecurring = [];
                
                if(data.present_list) {
                    Object.keys(data.present_list).forEach(nameKey => { if(data.present_list[nameKey]) presentSet.add(nameKey); });
                }
                if(data.visitorsNew) visitorsNew = data.visitorsNew;
                if(data.visitorsRecurring) visitorsRecurring = data.visitorsRecurring;
                
                db.ref(`attendance/${dateStr}/absentees_${DEPT_NAME}`).once('value').then(snap => {
                    absenteeReasons = snap.val() || {};
                    updateAbsenteeBadge(); renderLists(); 
                });
            });

            db.ref(`attendance/${dateStr}/report_details_${DEPT_NAME}`).on('value', snap => {
                currentReportDetails = snap.val() || {}; fillReportInputs();
            });
        }

        window.toggleAttendance = function(name) { 
            const dateStr = document.getElementById('today-date').value;
            const isPresent = presentSet.has(name);
            db.ref(`attendance/${dateStr}/${DEPT_NAME}/present_list/${name}`).set(isPresent ? null : true);
            document.getElementById('search-input').value = ""; 
        }

        window.moveOrAddFriend = function(targetGroupKey) {
            const name = prompt(`이 반에 영구 등록할 이름:`);
            if(!name || name.trim() === "") return; const cleanName = name.trim(); 
            let updates = {}; let isMoving = false; let currentGroupLabel = '';

            for(let key in allMembersObj) {
                let currentArray = allMembersObj[key] || [];
                const existingIndex = currentArray.findIndex(n => n === cleanName);
                if(existingIndex !== -1) {
                    isMoving = true;
                    if(key === targetGroupKey) { alert(`이미 이 반에 등록되어 있습니다.`); return; }
                    updates[`members/${key}`] = currentArray.filter(n => n !== cleanName);
                    let targetArray = allMembersObj[targetGroupKey] ? [...allMembersObj[targetGroupKey]] : [];
                    targetArray.push(cleanName); targetArray.sort((a, b) => a.localeCompare(b));
                    updates[`members/${targetGroupKey}`] = targetArray;
                    currentGroupLabel = parseGroupInfo(key).className;
                    break; 
                }
            }

            const targetClassName = parseGroupInfo(targetGroupKey).className;
            if(isMoving) {
                if(confirm(`[${cleanName}] 님을 [${targetClassName}] 반으로 이동시키겠습니까?`)) {
                    db.ref().update(updates).then(() => { alert(`🎉 이동 완료!`); window.toggleAttendance(cleanName); });
                }
            } else {
                let targetArray = allMembersObj[targetGroupKey] ? [...allMembersObj[targetGroupKey]] : [];
                targetArray.push(cleanName); targetArray.sort((a,b)=>a.localeCompare(b));
                db.ref(`members/${targetGroupKey}`).set(targetArray).then(() => { alert(`🎉 신규 등록 완료!`); window.toggleAttendance(cleanName); });
            }
        };

        function renderLists() {
            const container = document.getElementById('members-container'); container.innerHTML = ''; const keyword = document.getElementById('search-input').value.trim();
            const groupKeys = Object.keys(allMembersObj).sort((a, b) => a.localeCompare(b));
            
            let currentStudentCount = 0;
            teacherSet.clear(); // 교사 명단 초기화

            // 1차 패스: 선생님 명단 미리 싹 다 골라내기 (투명인간 마법 준비)
            groupKeys.forEach(gKey => {
                const info = parseGroupInfo(gKey); if (!info) return;
                // 폴더 이름 뒤에 붙은 선생님 이름 등록
                if (info.teacherName) teacherSet.add(info.teacherName);
                // 혹시 '교사'나 '임원' 폴더가 따로 있다면 그 안의 사람들도 다 선생님으로 등록
                if (info.className.includes('교사') || info.className.includes('임원') || info.className.includes('부장') || info.className.includes('전도사')) {
                    (allMembersObj[gKey] || []).forEach(name => teacherSet.add(name));
                }
            });

            // 2차 패스: 화면 그리기
            groupKeys.forEach(gKey => {
                const info = parseGroupInfo(gKey); if (!info) return;
                let membersArr = allMembersObj[gKey] || []; let displayMembers = [...membersArr];
                let hasKeyword = keyword !== ""; let groupMatch = hasKeyword && info.className.includes(keyword);
                let filteredMembers = membersArr.filter(name => name.includes(keyword));
                if (hasKeyword && !groupMatch && filteredMembers.length === 0 && (!info.teacherName || !info.teacherName.includes(keyword))) return;
                
                const section = document.createElement('div'); section.className = "bg-white p-2 rounded-xl shadow-sm border border-gray-200 mb-2";
                
                // 🚨 교사 버튼 UI 완벽 해결! (노란 뱃지 -> 학생과 똑같이 파란불 들어오는 정상 버튼으로 변경)
                let teacherBtnHtml = '';
                if (info.teacherName) {
                    const isTPresent = presentSet.has(info.teacherName);
                    // 흰 바탕 ↔ 파란 바탕 완벽 연동
                    const tClass = isTPresent ? 'bg-blue-600 text-white border-blue-800 shadow-md' : 'bg-white text-slate-700 border-slate-300';
                    teacherBtnHtml = `<button onclick="toggleAttendance('${info.teacherName}')" class="px-3 py-1.5 rounded-lg border-2 font-black text-sm active:scale-95 transition-all ${tClass}">👑 ${info.teacherName} (교사)</button>`;
                }

                section.innerHTML = `<div class="flex justify-between items-center mb-2 border-b border-gray-100 pb-2"><h3 class="text-sm font-black text-gray-800 flex items-center gap-1.5 section-title"><span class="w-2 h-4 bg-indigo-500 rounded-full"></span>${info.className} <span class="text-xs text-indigo-400 font-bold ml-1">${membersArr.length}명</span></h3>${teacherBtnHtml}</div>`;
                const grid = document.createElement('div'); grid.className = "grid grid-cols-6 gap-1.5"; 
                
                (hasKeyword ? filteredMembers : displayMembers).forEach(name => {
                    const isPresent = presentSet.has(name); 
                    
                    // 🚨 투명인간 마법 적용: 교사가 아니면서 파란불 켜진 사람만 카운트!
                    if (isPresent && !teacherSet.has(name)) {
                        currentStudentCount++;
                    }

                    const btn = document.createElement('button');
                    let isMatch = hasKeyword && name.includes(keyword);
                    btn.className = `member-btn w-full text-center tracking-tight leading-tight ${isPresent ? 'status-present' : 'status-absent'} ${isMatch ? 'highlight-search' : ''}`;
                    
                    let displayName = name;
                    if(name.length > 5) displayName = `<span class="text-[11px] leading-none">${name}</span>`;
                    
                    btn.innerHTML = displayName; 
                    btn.onclick = () => toggleAttendance(name); 
                    grid.appendChild(btn);
                });
                
                if(!keyword) { const addBtn = document.createElement('button'); addBtn.className = "member-btn w-full add-btn flex items-center justify-center active:scale-90 transition-transform"; addBtn.innerHTML = "+"; addBtn.onclick = () => moveOrAddFriend(gKey); grid.appendChild(addBtn); }
                section.appendChild(grid); container.appendChild(section);
            });
            
            if(visitorsNew.length > 0 || visitorsRecurring.length > 0) {
                const visSection = document.createElement('div'); visSection.className = "bg-orange-50 p-2 rounded-xl shadow-sm border border-orange-200 mb-2 mt-4";
                visSection.innerHTML = `<h3 class="text-sm font-black text-orange-800 mb-2 border-b border-orange-200 pb-2 section-title">👋 당일 방문자</h3>`;
                const visGrid = document.createElement('div'); visGrid.className = "grid grid-cols-4 gap-1.5";
                visitorsNew.forEach((v, idx) => { const btn = document.createElement('button'); btn.className = "member-btn w-full text-center status-visitor text-[12px] flex flex-col items-center py-1"; btn.innerHTML = `<span>${v.name}</span><span class="text-[9px] opacity-80 mt-0.5">${v.reason}</span>`; btn.onclick = () => { if(confirm(`${v.name} 삭제?`)) { visitorsNew.splice(idx, 1); db.ref(`attendance/${document.getElementById('today-date').value}/${DEPT_NAME}/visitorsNew`).set(visitorsNew); } }; visGrid.appendChild(btn); });
                visitorsRecurring.forEach((v, idx) => { const btn = document.createElement('button'); btn.className = "member-btn w-full text-center bg-slate-400 text-white text-[12px]"; btn.innerHTML = `${v.name} (계속)`; btn.onclick = () => { if(confirm(`${v.name} 삭제?`)) { visitorsRecurring.splice(idx, 1); db.ref(`attendance/${document.getElementById('today-date').value}/${DEPT_NAME}/visitorsRecurring`).set(visitorsRecurring); } }; visGrid.appendChild(btn); });
                visSection.appendChild(visGrid); container.appendChild(visSection);
            }

            // 하단 카운터 업데이트 (순수 학생 + 새친구)
            document.getElementById('count-display').innerText = currentStudentCount + visitorsNew.length;
        }

        function filterMembers() { renderLists(); }

        window.addVisitor = function(isNew) {
            const name = prompt(isNew ? "🆕 첫 방문자 이름:" : "🔄 계속 방문자 이름 (보고제외):"); if(!name || name.trim() === "") return;
            const dateStr = document.getElementById('today-date').value;
            if(isNew) { const reason = prompt(`[${name.trim()}] 방문 사유`) || "새친구"; visitorsNew.push({ name: name.trim(), reason: reason }); db.ref(`attendance/${dateStr}/${DEPT_NAME}/visitorsNew`).set(visitorsNew); }
            else { visitorsRecurring.push({ name: name.trim() }); db.ref(`attendance/${dateStr}/${DEPT_NAME}/visitorsRecurring`).set(visitorsRecurring); }
        };

        window.submitReportDetails = function() {
            const targetDate = document.getElementById('today-date').value;
            currentReportDetails = { preacher: document.getElementById('rep-preacher').value, scripture: document.getElementById('rep-scripture').value, title: document.getElementById('rep-title').value };
            db.ref(`attendance/${targetDate}/report_details_${DEPT_NAME}`).set(currentReportDetails);
            db.ref(`attendance/${targetDate}/absentees_${DEPT_NAME}`).set(absenteeReasons);
            alert(`💾 최종 보고서 저장 완료!`);
        }

        window.openReportCenter = function() { document.getElementById('report-modal').style.display = 'flex'; }
        window.closeReportCenter = function() { document.getElementById('report-modal').style.display = 'none'; }
        window.closeReportView = function() { document.getElementById('report-view').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; }

        // 🚨 V7 교육부서 찐최종 보고서 생성 (교사 분리 마법 적용)
        window.generateA4Report = async function() {
            const dateVal = document.getElementById('today-date').value;
            const targetDateStr = dateVal.replace(/-/g, '. ');

            const preacher = currentReportDetails.preacher || "미입력";
            const scripture = currentReportDetails.scripture || "미입력";
            const title = currentReportDetails.title || "미입력";

            let groupRowsHtml = '';
            let globalStudentPresentCount = visitorsNew.length; // 총 학생수 (방문자 포함)
            
            const groupKeys = Object.keys(allMembersObj).sort((a, b) => a.localeCompare(b));
            
            groupKeys.forEach((gKey) => {
                const info = parseGroupInfo(gKey);
                
                let studentPresent = []; let studentAbsent = [];
                let studentCountInClass = 0;

                // 해당 폴더 내의 학생들 체크
                (allMembersObj[gKey]||[]).forEach(name => {
                    const isPresent = presentSet.has(name);
                    if(!teacherSet.has(name)) {
                        if(isPresent) { studentPresent.push(name); studentCountInClass++; globalStudentPresentCount++; }
                        else studentAbsent.push(name);
                    }
                });

                // 교사 표시 마법 (출석: 파란색 / 결석: 회색 괄호)
                let teacherHtml = '-';
                if(info.teacherName) {
                    const isTPresent = presentSet.has(info.teacherName);
                    teacherHtml = isTPresent ? `<span class="font-black text-blue-800">${info.teacherName}</span>` : `<span class="font-medium text-slate-400">(${info.teacherName})</span>`;
                }

                // 일반 학생 반 렌더링
                if(!info.className.includes('교사') && !info.className.includes('임원')) {
                    if(studentPresent.length > 0 || studentAbsent.length > 0 || info.teacherName) {
                        groupRowsHtml += `
                            <tr>
                                <td class="font-black text-slate-800 bg-slate-50">${info.className}</td>
                                <td class="font-black text-blue-700">${studentCountInClass}명</td>
                                <td class="text-left text-slate-800 font-bold leading-relaxed">${studentPresent.join(', ') || '-'}</td>
                                <td class="text-left text-red-500 font-medium leading-relaxed">${studentAbsent.join(', ') || '-'}</td>
                                <td class="text-sm">${teacherHtml}</td>
                            </tr>`;
                    }
                } else {
                    // 혹시 '교사및임원' 같은 교사 전용 폴더가 있다면 하단에 따로 표기
                    let extraTeachers = [];
                    (allMembersObj[gKey]||[]).forEach(name => {
                        const isPresent = presentSet.has(name);
                        extraTeachers.push(isPresent ? `<span class="font-black text-blue-800">${name}</span>` : `<span class="font-medium text-slate-400">(${name})</span>`);
                    });
                    if(extraTeachers.length > 0) {
                        groupRowsHtml += `
                            <tr>
                                <td class="font-black text-slate-800 bg-slate-50">${info.className}</td>
                                <td class="font-black text-slate-400">-</td>
                                <td colspan="2" class="text-center text-slate-400 text-xs tracking-widest font-bold bg-slate-50">해당 칸은 학생 명단 전용입니다</td>
                                <td class="text-sm leading-relaxed">${extraTeachers.join(', ')}</td>
                            </tr>`;
                    }
                }
            });

            // 스냅샷 저장
            db.ref(`attendance/${dateVal}/${DEPT_NAME}/total_snapshot`).set(globalStudentPresentCount);

            const visHtml = visitorsNew.map(v=>`${v.name}(${v.reason})`).join(', ') || "없음";
            const absKeys = Object.keys(absenteeReasons).sort();
            let absReasonHtml = absKeys.map(name => `[${name}] ${absenteeReasons[name]}`).join(' / ') || "<span class='text-red-400 font-medium'>작성된 결석/특이 사유가 없습니다.</span>";

            const html = `
                <div class="border-b-4 border-blue-900 pb-3 mb-6 flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-black text-blue-950 tracking-tighter">${DEPT_NAME} 예배 및 출석 보고서</h1>
                        <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Tashkent Korean Church</p>
                    </div>
                    <div class="text-xl font-black text-blue-950">${targetDateStr}</div>
                </div>

                <div class="grid grid-cols-12 gap-6 mb-8">
                    <div class="col-span-6 flex flex-col gap-4">
                        <div>
                            <h2 class="text-[15px] font-black text-blue-950 mb-2 border-b-2 border-blue-900 pb-1">I. 예배 정보</h2>
                            <table class="w-full text-[13px] border border-slate-300">
                                <tbody>
                                    <tr class="border-b border-slate-300"><th class="w-1/4 bg-slate-100 py-2 text-slate-600 font-bold border-r border-slate-300">인도</th><td class="pl-3 font-bold text-slate-800">${preacher}</td></tr>
                                    <tr class="border-b border-slate-300"><th class="bg-slate-100 py-2 text-slate-600 font-bold border-r border-slate-300">본문</th><td class="pl-3 font-bold text-slate-800">${scripture}</td></tr>
                                    <tr><th class="bg-slate-100 py-2 text-slate-600 font-bold border-r border-slate-300">제목</th><td class="pl-3 font-bold text-slate-800">${title}</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="border border-slate-200 rounded-lg p-3 bg-slate-50 flex-1">
                            <p class="font-black text-green-700 text-[12px] mb-1">🌱 방문자 및 새친구</p>
                            <p class="font-bold text-slate-800 text-[13px] mb-4">${visHtml}</p>
                            <p class="font-black text-orange-600 text-[12px] mb-1">📝 특이사항 및 결석사유 요약</p>
                            <div class="bg-red-50 text-red-800 p-2 rounded text-[12px] font-bold leading-relaxed">${absReasonHtml}</div>
                        </div>
                    </div>
                    
                    <div class="col-span-6 flex flex-col">
                        <div class="bg-[#243c7c] rounded-xl p-4 flex justify-between items-center shadow-md mb-4">
                            <div>
                                <p class="text-blue-200 text-[10px] font-bold uppercase tracking-wider">Total Attendance (Students)</p>
                                <p class="text-lg font-black text-white mt-1">총 출석 인원 <span class="text-xs font-normal opacity-80">(교사제외)</span></p>
                            </div>
                            <div class="text-right"><span class="text-4xl font-black text-white">${globalStudentPresentCount}</span><span class="text-sm font-bold text-blue-200 ml-1">명</span></div>
                        </div>
                        <div class="border border-slate-200 rounded-xl p-3 bg-white mt-auto">
                            <p class="text-[12px] font-black text-slate-700 mb-2 flex items-center gap-1">📊 최근 4주 출석 추이 <span class="text-[10px] font-normal text-slate-400 ml-1">(학생 기준)</span></p>
                            <div class="relative w-full" style="height: 110px;">
                                <canvas id="trendChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <h2 class="text-[15px] font-black text-blue-950 mb-2 border-b-2 border-blue-900 pb-1">II. 상세 출석 명단</h2>
                <table class="w-full text-[12px] border-t-2 border-blue-900 dense-table">
                    <thead>
                        <tr><th class="w-[10%]">반(구분)</th><th class="w-[10%]">출석인원</th><th class="w-[33%]">출석 학생 ✅</th><th class="w-[33%]">결석 학생 ❌</th><th class="w-[14%]">교사 👑</th></tr>
                    </thead>
                    <tbody>${groupRowsHtml}</tbody>
                </table>
            `;

            document.getElementById('a4-content').innerHTML = html;
            closeReportCenter(); document.getElementById('main-app').style.display = 'none'; document.getElementById('report-view').style.display = 'block';
            
            setTimeout(() => {
                scaleReport();
                const ctx = document.getElementById('trendChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['3주전', '2주전', '지난주', '이번주'],
                        datasets: [{
                            data: [globalStudentPresentCount, globalStudentPresentCount, globalStudentPresentCount, globalStudentPresentCount], // 그래프 임시동일화
                            backgroundColor: ['#cbd5e1', '#cbd5e1', '#cbd5e1', '#4f46e5'],
                            borderRadius: 4, barPercentage: 0.6
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, min: 0 }, x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } } }, animation: { onComplete: function() { const chartInstance = this; const ctx = chartInstance.ctx; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.font = 'bold 11px "Noto Sans KR"'; chartInstance.data.datasets[0].data.forEach(function(val, i) { const meta = chartInstance.getDatasetMeta(0); const bar = meta.data[i]; ctx.fillStyle = i === 3 ? '#312e81' : '#64748b'; ctx.fillText(val, bar.x, bar.y - 4); }); } } }
                });
            }, 100);
        }

        function fillReportInputs() {
            document.getElementById('rep-preacher').value = currentReportDetails.preacher || ""; document.getElementById('rep-scripture').value = currentReportDetails.scripture || ""; document.getElementById('rep-title').value = currentReportDetails.title || "";
        }

        function scaleReport() {
            const container = document.getElementById('report-container'); const page = document.getElementById('a4-content');
            const w = container.clientWidth;
            if(w < 820) { const scale = w / 820; page.style.transform = `scale(${scale})`; page.style.transformOrigin = 'top center'; container.style.height = `${1123 * scale + 40}px`; }
            else { page.style.transform = 'none'; container.style.height = 'auto'; }
        }

        window.openAbsenteeModal = function() {
            const listContainer = document.getElementById('absentee-list-container'); listContainer.innerHTML = '';
            let absentees = []; 
            
            // 🚨 결석한 선생님들도 사유 입력칸에 자동 추가!
            teacherSet.forEach(tName => {
                if(!presentSet.has(tName)) absentees.push(tName + " (교사)");
            });

            // 학생들 추가
            Object.keys(allMembersObj).forEach(gKey => { 
                (allMembersObj[gKey]||[]).forEach(name => { 
                    if(!presentSet.has(name) && !teacherSet.has(name) && !absentees.includes(name)) absentees.push(name); 
                }); 
            });

            absentees.forEach(name => {
                const isTeacher = name.includes("(교사)");
                const realName = isTeacher ? name.replace(" (교사)", "") : name; // 저장할 땐 원래 이름으로!
                const hasReason = !!absenteeReasons[realName]; 
                
                const btn = document.createElement('button'); 
                btn.className = `w-full text-left p-3 rounded-lg border-2 mb-2 font-bold text-sm transition-all ${hasReason ? 'border-orange-500 bg-orange-50 text-orange-900' : 'border-slate-200 bg-white text-slate-500'}`;
                btn.innerHTML = `<div class="flex justify-between"><span>${isTeacher ? '👑 ' : ''}${name}</span><span class="text-xs px-2 py-0.5 rounded-full ${hasReason?'bg-orange-500 text-white':'bg-slate-200'}">${hasReason?'입력됨':'사유 입력'}</span></div>${hasReason ? `<div class="mt-2 text-orange-700 bg-white p-2 border border-orange-200">👉 ${absenteeReasons[realName]}</div>` : ''}`;
                btn.onclick = () => { 
                    const reason = prompt(`[${name}] 결석 사유 입력:`, absenteeReasons[realName] || ""); 
                    if(reason !== null) { 
                        if(reason.trim()==="") delete absenteeReasons[realName]; 
                        else absenteeReasons[realName] = reason.trim(); 
                        openAbsenteeModal(); updateAbsenteeBadge(); 
                    } 
                };
                listContainer.appendChild(btn);
            });
            document.getElementById('absentee-modal').style.display = 'flex';
        }
        window.closeAbsenteeModal = function() { document.getElementById('absentee-modal').style.display = 'none'; }
        function updateAbsenteeBadge() { document.getElementById('absentee-count-badge').innerText = `${Object.keys(absenteeReasons).length}명 작성됨`; }
        function checkServerStatus() { document.getElementById('db-status').innerText = `🟢 서버 연동 완료!`; document.getElementById('db-status').className = "text-[11px] font-bold text-green-600 mt-2 text-center"; }
        window.addEventListener('resize', () => { if(document.getElementById('report-view').style.display === 'block') scaleReport(); });
        window.onload = initApp;
    </script>
</body>
</html>
