<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⛪ 통합 부서 마스터 V7 (찐최종)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .member-btn { transition: transform 0.1s ease; border-radius: 0.5rem; padding-top: 0.65rem; padding-bottom: 0.65rem; font-size: 14.5px; font-weight: 900; letter-spacing: -0.5px; }
        .member-btn:active { transform: scale(0.92); }
        .status-absent { background-color: #ffffff; color: #475569; border: 1.5px solid #cbd5e1; }
        .status-present { background-color: #2563eb; color: white; border: 1.5px solid #1e3a8a; box-shadow: 0 4px 6px rgba(37,99,235,0.3); }
        .status-visitor { background-color: #ea580c; color: white; border: 1.5px solid #9a3412; }
        .add-btn { background-color: #eff6ff; color: #3b82f6; border: 2px dashed #93c5fd; font-size: 20px !important; }
        
        @media (min-width: 768px) {
            .member-btn { font-size: 20px; padding-top: 1.25rem; padding-bottom: 1.25rem; }
            .add-btn { font-size: 26px !important; }
            #search-input { font-size: 24px; padding: 1.25rem; }
            .section-title { font-size: 22px; }
        }
        
        .highlight-search { animation: pulse-border 1.2s infinite; background-color: #fef08a !important; color: #b45309 !important; border: 2.5px solid #ea580c !important; transform: scale(1.05) !important; z-index: 10 !important; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(234, 88, 12, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0); } }
        
        #report-modal, #absentee-modal, #report-view { display: none; }
        
        /* 🚨 모바일 찌그러짐 원천 차단! 절대 폭 794px 강제 고정 */
        #report-container { width: 100%; display: flex; justify-content: center; overflow-x: hidden; }
        .a4-page { width: 794px !important; min-width: 794px !important; max-width: 794px !important; min-height: 1123px; background: white; padding: 30px 40px; box-sizing: border-box; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin: 0 auto; transform-origin: top center; }
        .tkc-blue { color: #1e3a8a; } .tkc-blue-border { border-color: #1e3a8a; }
        
        .dense-table th, .dense-table td { padding: 6px 8px; border: 1px solid #cbd5e1; }
        .dense-table th { background-color: #f1f5f9; color: #334155; font-weight: 900; }
        
        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            #main-app, #report-modal, #absentee-modal, .no-print { display: none !important; }
            #report-view { display: block !important; padding: 0; background: white; }
            #report-container { height: auto !important; }
            .a4-page { box-shadow: none; width: 100% !important; max-width: 100% !important; padding: 10mm; transform: none !important; margin: 0 !important; }
        }
    </style>
</head>
<body class="pb-28 text-slate-800">

    <div id="main-app">
        <div class="bg-white shadow-sm px-3 py-3 border-b-4 border-indigo-700">
            <div class="flex justify-between items-center mb-3">
                <h1 id="app-title" class="text-lg font-black text-indigo-900 tracking-tight section-title">⛪ 부서명 출석부 V7</h1>
                <input type="date" id="today-date" class="text-sm font-bold text-gray-700 bg-gray-100 px-2 py-1 rounded border border-gray-300 outline-none">
            </div>

            <div class="bg-orange-50 p-2 rounded-xl border border-orange-200 mb-3 flex gap-2">
                <button onclick="addVisitor(true)" class="flex-1 bg-orange-500 text-white py-2 rounded-lg font-black text-sm shadow active:scale-95">🆕 방문자 추가</button>
                <button onclick="addVisitor(false)" class="flex-1 bg-slate-500 text-white py-2 rounded-lg font-black text-sm shadow active:scale-95">🔄 계속 방문(보고❌)</button>
            </div>

            <div>
                <input type="text" id="search-input" onkeyup="filterMembers()" class="w-full border-2 border-indigo-400 rounded-xl p-3.5 text-lg font-black shadow-sm focus:outline-none focus:border-indigo-600 text-center text-indigo-900 placeholder-indigo-300" placeholder="🔍 이름 검색 (새친구는 [+] 버튼)">
            </div>
            <p id="db-status" class="text-[11px] font-bold text-orange-500 mt-2 text-center">🟡 시스템 가동 준비 중...</p>
        </div>

        <div id="members-container" class="p-2 space-y-3 bg-slate-50"></div>

        <div class="fixed bottom-0 left-0 w-full bg-white border-t-2 border-slate-200 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-40 flex justify-between items-center shrink-0 pb-6">
            <div class="pl-2 leading-none flex-1">
                <p class="text-xs font-bold text-gray-500 mb-1">현재 출석</p>
                <p class="text-3xl font-black text-indigo-700"><span id="count-display">0</span><span class="text-sm text-gray-600 font-bold ml-1">명</span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="submitRealAttendance()" class="bg-indigo-800 text-white px-4 py-3 rounded-xl font-black text-sm shadow-lg active:scale-95 section-title">💾 마감저장</button>
                <button onclick="openReportCenter()" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-black text-sm shadow-lg active:scale-95 section-title">📑 보고서 작성</button>
            </div>
        </div>
    </div>

    <div id="report-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl border-t-8 border-indigo-600 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-black text-indigo-900 tracking-tight">🗂️ 예배일지 작성</h2><button onclick="closeReportCenter()" class="text-gray-400 font-bold text-xl">&times;</button></div>
            <div class="space-y-2 mb-6 bg-slate-50 p-3 rounded-lg border border-slate-200">
                <input type="text" id="rep-preacher" placeholder="설교자 / 인도자" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <input type="text" id="rep-scripture" placeholder="말씀 본문" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <input type="text" id="rep-title" placeholder="설교 제목" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <textarea id="rep-note" placeholder="특이사항 요약..." class="w-full border border-slate-300 rounded p-2 text-sm font-bold h-16 outline-none resize-none"></textarea>
            </div>
            <button onclick="openAbsenteeModal()" class="w-full bg-orange-100 text-orange-700 border border-orange-300 py-3 rounded-xl font-black text-sm mb-6 active:scale-95 flex justify-between px-4 items-center"><span>✍️ 결석자 사유 적기</span><span id="absentee-count-badge" class="bg-orange-500 text-white px-2 py-0.5 rounded-full text-xs">0명 완료</span></button>
            <button onclick="generateSingleReport()" class="w-full bg-indigo-700 text-white py-4 rounded-xl font-black text-base shadow-lg active:scale-95 text-center">🚀 부서 예배 보고서 생성</button>
        </div>
    </div>

    <div id="absentee-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-5 shadow-2xl flex flex-col h-[80vh]">
            <div class="flex justify-between items-center mb-3"><h2 class="text-lg font-black text-orange-700">✍️ 결석자 사유 입력</h2><button onclick="closeAbsenteeModal()" class="text-gray-500 font-bold bg-gray-100 px-3 py-1 rounded-lg text-sm">완료</button></div>
            <div id="absentee-list-container" class="overflow-y-auto flex-1 space-y-2 bg-slate-50 p-2 rounded-lg border border-slate-200"></div>
        </div>
    </div>

    <div id="report-view" class="bg-gray-200 min-h-screen py-8 w-full overflow-y-auto overflow-x-hidden">
        <div class="text-center mb-6 no-print flex gap-3 justify-center w-full px-4">
            <button onclick="closeReportView()" class="flex-1 max-w-[200px] bg-slate-700 text-white py-3 rounded-xl font-black shadow-lg active:scale-95 text-lg">🔙 뒤로가기</button>
            <button onclick="window.print()" class="flex-1 max-w-[200px] bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg active:scale-95 text-lg">🖨️ 인쇄하기</button>
        </div>
        <div id="report-container">
            <div class="a4-page relative" id="a4-content"></div>
        </div>
    </div>

    <script>
        // 🚨 [필독] 부서에 맞게 아래 이름만 바꾸세요!
        const DEPT_NAME = "중고등부"; 
        
        const historyData = {
            '청년부': [38, 33, 36],
            '중고등부': [59, 53, 55],
            '유초등부': [32, 30, 29],
            '유치부': [4, 3, 4] 
        };

        const firebaseConfig = { databaseURL: "https://tashkent-church-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        let presentSet = new Set(); let allDeptData = {}; 
        let visitorsNew = []; let visitorsRecurring = []; let absenteeReasons = {}; 
        let chartInstance = null;

        function initApp() {
            document.getElementById('app-title').innerText = `⛪ ${DEPT_NAME} 출석부 V7`;
            document.getElementById('today-date').value = new Date().toISOString().split('T')[0];
            db.ref('members').on('value', (snap) => {
                const data = snap.val() || {}; let processed = {};
                for(let k in data) { if(k.startsWith(DEPT_NAME + "_")) { processed[k] = data[k] ? (Array.isArray(data[k]) ? [...data[k]] : Object.values(data[k])) : []; } }
                allDeptData = processed; document.getElementById('db-status').innerHTML = `🟢 ${DEPT_NAME} 연동 완료!`; document.getElementById('db-status').className = "text-[11px] font-bold text-green-600 mt-2 text-center";
                renderLists();
            });
            loadAttendanceData();
            document.getElementById('today-date').addEventListener('change', loadAttendanceData);
        }

        function parseGroupInfo(groupKey) {
            const prefix = DEPT_NAME + "_"; if (!groupKey.startsWith(prefix)) return null;
            const rest = groupKey.substring(prefix.length); 
            if (DEPT_NAME === "청년부" || DEPT_NAME === "유치부") return { className: rest, leaderName: null };
            const parts = rest.split('_');
            if (parts.length >= 2) { const leaderName = parts.pop().trim(); const className = parts.join('_'); return { className, leaderName }; }
            else return { className: rest, leaderName: null }; 
        }

        function getSortedGroups(dataObj) {
            return Object.keys(dataObj).sort((a, b) => {
                const getRank = (name) => {
                    if (name.includes("고3")) return 1; if (name.includes("고2")) return 2; if (name.includes("고1")) return 3;
                    if (name.includes("중3")) return 4; if (name.includes("중2")) return 5; if (name.includes("중1")) return 6;
                    if (name.includes("6학년")) return 11; if (name.includes("5학년")) return 12; if (name.includes("4학년")) return 13;
                    if (name.includes("3학년")) return 14; if (name.includes("2학년")) return 15; if (name.includes("1학년")) return 16;
                    if (name.includes("7세")) return 21; if (name.includes("6세")) return 22; if (name.includes("5세")) return 23; 
                    if (name.includes("3_4세")) return 24; if (name.includes("2세")) return 25;
                    if (name.includes("교사및임원") || name.includes("교사") || name.includes("임원")) return 99; 
                    return 50; 
                };
                let rA = getRank(a), rB = getRank(b); return rA === rB ? a.localeCompare(b) : rA - rB;
            });
        }

        function loadAttendanceData() {
            const dateStr = document.getElementById('today-date').value;
            db.ref(`attendance/${dateStr}/${DEPT_NAME}`).once('value').then((snapshot) => {
                const data = snapshot.val() || {}; presentSet.clear(); visitorsNew = []; visitorsRecurring = []; absenteeReasons = {};
                if(data.groups) Object.values(data.groups).forEach(g => { if(g.present) g.present.forEach(n => presentSet.add(n)); });
                if(data.visitorsNew) visitorsNew = data.visitorsNew; if(data.visitorsRecurring) visitorsRecurring = data.visitorsRecurring;
                db.ref(`attendance/${dateStr}/absentees_${DEPT_NAME}`).once('value').then(snap => { absenteeReasons = snap.val() || {}; updateAbsenteeBadge(); renderLists(); });
            });
        }

        window.toggleAttendance = function(name) { 
            const cleanName = name.trim();
            if(presentSet.has(cleanName)) presentSet.delete(cleanName); else presentSet.add(cleanName); 
            document.getElementById('search-input').value = ""; 
            renderLists(); 
        }

        window.addVisitor = function(isNew) {
            const name = prompt(isNew ? `🆕 [${DEPT_NAME}] 첫 방문자 이름:` : `🔄 계속 방문자 이름 (보고제외):`); if(!name || name.trim() === "") return;
            if(isNew) { const reason = prompt(`[${name.trim()}] 방문 사유 (예: 친구초청)`) || "새친구"; visitorsNew.push({ name: name.trim(), reason: reason }); }
            else { visitorsRecurring.push({ name: name.trim() }); } renderLists();
        };

        window.addNewFriend = function(groupKey, displayGroupName) {
            const name = prompt(`[${displayGroupName}] 반 영구 등록할 이름:`); if(!name || name.trim() === "") return; const cleanName = name.trim();
            let targetArr = allDeptData[groupKey] ?
