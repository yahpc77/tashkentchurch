<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>⛪ 청년부 출석 마스터 V7.2</title>
    <link rel="manifest" href="manifest_young.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .member-btn {
            transition: transform .1s ease;
            border-radius: .5rem;
            padding-top: .65rem;
            padding-bottom: .65rem;
            font-size: 14.5px;
            font-weight: 900;
            letter-spacing: -.5px;
            user-select: none;
            -webkit-user-select: none;
        }

        .member-btn:active {
            transform: scale(.92);
        }

        .status-absent {
            background: #fff;
            color: #475569;
            border: 1.5px solid #cbd5e1;
        }

        .status-present {
            background: #2563eb;
            color: #fff;
            border: 1.5px solid #1e3a8a;
            box-shadow: 0 4px 6px rgba(37, 99, 235, .3);
        }

        .status-visitor {
            background: #ea580c;
            color: #fff;
            border: 1.5px solid #9a3412;
        }

        .add-btn {
            background: #eff6ff;
            color: #3b82f6;
            border: 2px dashed #93c5fd;
            font-size: 20px !important;
        }

        @media(min-width:768px) {
            .member-btn {
                font-size: 20px;
                padding-top: 1.25rem;
                padding-bottom: 1.25rem;
            }

            .add-btn {
                font-size: 26px !important;
            }

            #search-input {
                font-size: 24px;
                padding: 1.25rem;
            }

            .section-title {
                font-size: 22px;
            }
        }

        .highlight-search {
            animation: pulse-border 1.2s infinite;
            background-color: #fef08a !important;
            color: #b45309 !important;
            border: 2.5px solid #ea580c !important;
            transform: scale(1.05) !important;
            z-index: 10 !important;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 0 0 rgba(234, 88, 12, .7);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(234, 88, 12, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(234, 88, 12, 0);
            }
        }

        #report-modal,
        #absentee-modal,
        #report-view,
        #reason-select-modal {
            display: none;
        }

        #report-container {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            background: #e5e7eb;
            padding: 20px 0;
        }

        .a4-page {
            width: 794px !important;
            min-width: 794px !important;
            max-width: 794px !important;
            min-height: 1123px;
            background: #fff;
            padding: 40px 50px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
            margin: 0 auto;
            transform-origin: top center;
        }

        .dense-table th,
        .dense-table td {
            padding: 8px 6px;
            border-bottom: 1px solid #cbd5e1;
            word-break: keep-all;
            text-align: center;
        }

        .dense-table th {
            background: #f1f5f9;
            color: #334155;
            font-weight: 900;
            border-top: 2px solid #1e3a8a;
            border-bottom: 2px solid #cbd5e1;
        }

        .dense-table tr:last-child td {
            border-bottom: 2px solid #1e3a8a;
        }

        #pin-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .pin-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .pin-card {
            background: rgba(255, 255, 255, .12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 1.5rem;
            padding: 2rem 1.75rem;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, .35);
        }

        .pin-title {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: .2rem;
            letter-spacing: -.5px;
        }

        .pin-subtitle {
            color: rgba(255, 255, 255, .55);
            font-size: .8rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .4);
            background: transparent;
            transition: all .2s ease;
        }

        .pin-dot.filled {
            background: #fff;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, .6);
        }

        .pin-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .6rem;
            margin-bottom: 1rem;
        }

        .pin-key {
            background: rgba(255, 255, 255, .15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: .8rem;
            padding: .9rem .5rem;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform .1s, background .1s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .pin-key:active {
            background: rgba(255, 255, 255, .3);
            transform: scale(.93);
        }

        .pin-key.wide {
            grid-column: span 2;
        }

        .pin-confirm-btn {
            width: 100%;
            padding: 1rem;
            background: #fff;
            color: #1e3a8a;
            font-size: 1rem;
            font-weight: 900;
            border-radius: .9rem;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .2);
            transition: transform .1s, box-shadow .1s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .pin-confirm-btn:active {
            transform: scale(.97);
        }

        .pin-error {
            color: #fca5a5;
            font-size: .82rem;
            font-weight: 700;
            margin-top: .75rem;
            min-height: 1.2em;
        }

        .hidden {
            display: none !important;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-6px);
            }

            80% {
                transform: translateX(6px);
            }
        }

        @media print {
            body {
                background: #fff;
                margin: 0;
                padding: 0;
            }

            #main-app,
            #report-modal,
            #absentee-modal,
            #reason-select-modal,
            .no-print {
                display: none !important;
            }

            #report-view {
                display: block !important;
                padding: 0;
                background: #fff;
            }

            #report-container {
                height: auto !important;
                padding: 0;
                background: #fff;
            }

            .a4-page {
                box-shadow: none;
                width: 100% !important;
                max-width: 100% !important;
                padding: 10mm;
                transform: none !important;
                margin: 0 !important;
            }
        }
    </style>
</head>

<body class="pb-28 text-slate-800">

    <!-- 메인 앱 -->

        <div class="bg-white shadow-sm px-3 py-3 border-b-4 border-indigo-700">
            <div class="flex justify-between items-center mb-3">

    <!-- 인쇄용 뷰 -->
    <div id="report-view" class="bg-gray-200 min-h-screen w-full overflow-y-auto overflow-x-hidden">

            <div class="a4-page relative" id="a4-content"></div>
        </div>

    <script>
        const DEPT_NAME = "청년부";
        const firebaseConfig = {
            apiKey: "AIzaSyAX7b9Hhm2yCV-L-WrMUSpVw50QMpaSyLM",
            authDomain: "tashkent-church.firebaseapp.com",
            databaseURL: "https://tashkent-church-default-rtdb.firebaseio.com",
            projectId: "tashkent-church",
            storageBucket: "tashkent-church.firebasestorage.app",
            messagingSenderId: "29101531778",
            appId: "1:29101531778:web:bab2f311c015255f33ca9b",
            measurementId: "G-1GLQ745PEW"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const auth = firebase.auth();

        // ── PIN 인증 ──────────────────────────────────────────────
        const CORRECT_PIN = '2301';
        let pinValue = '';

        function updatePinDots() {
            for (let i = 0; i < 4; i++) {
                const d = document.getElementById('dot-' + i);
                if (d) d.classList.toggle('filled', i < pinValue.length);
            }
        }
        function pinInput(digit) {
            if (pinValue.length >= 4) return;
            pinValue += digit;
            updatePinDots();
            if (pinValue.length === 4) checkPin();
        }
        function pinDelete() {
            pinValue = pinValue.slice(0, -1);
            updatePinDots();
            document.getElementById('pin-error-msg').textContent = '';
        }
        function checkPin() {
            if (pinValue !== CORRECT_PIN) {
                document.getElementById('pin-error-msg').textContent = '🔒 비밀번호를 확인해 주세요.';
                const dots = document.querySelector('.pin-dots');
                dots.style.animation = 'none'; dots.offsetHeight; dots.style.animation = 'shake 0.4s ease';
                pinValue = ''; setTimeout(updatePinDots, 400); return;
            }
            document.getElementById('pin-error-msg').textContent = '🔄 접속 중...';
            auth.signInAnonymously().catch(err => {
                console.error(err);
                document.getElementById('pin-error-msg').textContent = '⚠️ 서버 연결 실패. 다시 시도해 주세요.';
                pinValue = ''; updatePinDots();
            });
        }
        function setupPinKeypad() {
            const keypad = document.getElementById('pin-keypad'); if (!keypad) return;
            keypad.querySelectorAll('[data-digit]').forEach(btn =>
                btn.addEventListener('click', () => pinInput(btn.dataset.digit)));
            const del = document.getElementById('pin-delete-btn');
            if (del) del.addEventListener('click', pinDelete);
            const conf = document.getElementById('pin-confirm-btn');
            if (conf) conf.addEventListener('click', checkPin);
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupPinKeypad);
        } else { setupPinKeypad(); }

        // 매 페이지 로드 시 강제 로그아웃 → PIN 화면을 항상 표시
        auth.signOut().then(() => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('pin-screen').classList.add('hidden');
                    document.getElementById('main-app').style.display = 'block';
                    initApp();
                } else {
                    document.getElementById('pin-screen').classList.remove('hidden');
                    document.getElementById('main-app').style.display = 'none';
                    pinValue = ''; updatePinDots();
                }
            });
        });

        // ── 앱 데이터 변수 ─────────────────────────────────────────
        let allMembersObj = {}; let presentSet = new Set();
        let visitorsNew = []; let visitorsRecurring = [];
        let globalAbsenteeReasons = {};
        let currentReportDetails = {};
        let currentReasonTarget = "";

        function sortMembers(arr) {
            return arr.sort((a, b) => {
                const rA = a.includes('(리더)') ? 1 : a.includes('(부리더)') ? 2 : 3;
                const rB = b.includes('(리더)') ? 1 : b.includes('(부리더)') ? 2 : 3;
                if (rA !== rB) return rA - rB;
                return a.localeCompare(b);
            });
        }

        function initApp() {
            document.getElementById('today-date').value = new Date().toISOString().split('T')[0];
            db.ref('members').on('value', snap => {
                const data = snap.val() || {}; let processed = {};
                for (let k in data) {
                    if (k.startsWith(DEPT_NAME + '_')) {
                        let arr = data[k] ? (Array.isArray(data[k]) ? data[k] : Object.values(data[k])) : [];
                        processed[k] = sortMembers(arr);
                    }
                }
                allMembersObj = processed; checkServerStatus(); startAttendanceSync();
            });
            db.ref('global_absentee_reasons_' + DEPT_NAME).on('value', snap => {
                globalAbsenteeReasons = snap.val() || {}; updateAbsenteeBadge();
            });
            document.getElementById('today-date').addEventListener('change', startAttendanceSync);
        }

        function startAttendanceSync() {
            const dateStr = document.getElementById('today-date').value;
            const path = 'attendance/' + dateStr + '/' + DEPT_NAME;
            db.ref(path).off();
            db.ref('attendance/' + dateStr + '/report_details_' + DEPT_NAME).off();
            db.ref(path).on('value', snapshot => {
                const data = snapshot.val() || {};
                presentSet.clear(); visitorsNew = []; visitorsRecurring = [];
                if (data.present_list) Object.keys(data.present_list).forEach(n => { if (data.present_list[n]) presentSet.add(n); });
                if (data.visitorsNew) visitorsNew = data.visitorsNew;
                if (data.visitorsRecurring) visitorsRecurring = data.visitorsRecurring;
                updateAbsenteeBadge(); renderLists();
            });
            db.ref('attendance/' + dateStr + '/report_details_' + DEPT_NAME).on('value', snap => {
                currentReportDetails = snap.val() || {}; fillReportInputs();
            });
        }

        window.toggleAttendance = function (fullName) {
            const dateStr = document.getElementById('today-date').value;
            const isPresent = presentSet.has(fullName);
            db.ref('attendance/' + dateStr + '/' + DEPT_NAME + '/present_list/' + fullName).set(isPresent ? null : true);
            document.getElementById('search-input').value = "";
            if (!isPresent) db.ref('global_absentee_reasons_' + DEPT_NAME + '/' + fullName).remove();
        };

        window.moveOrAddFriend = function (targetGroupKey) {
            const name = prompt('영구 등록할 성도 이름 (예: 김철수, 강지명(리더)):');
            if (!name || name.trim() === '') return;
            const cleanName = name.trim();
            let updates = {}; let isMoving = false; let currentGroupLabel = '';
            for (let key in allMembersObj) {
                let arr = allMembersObj[key] || [];
                const idx = arr.findIndex(n => n === cleanName);
                if (idx !== -1) {
                    isMoving = true;
                    if (key === targetGroupKey) { alert('이미 이 조에 등록된 성도입니다.'); return; }
                    updates['members/' + key] = arr.filter(n => n !== cleanName);
                    let tArr = allMembersObj[targetGroupKey] ? [...allMembersObj[targetGroupKey]] : [];
                    tArr.push(cleanName); updates['members/' + targetGroupKey] = sortMembers(tArr);
                    const gKeys = Object.keys(allMembersObj).sort((a, b) => a.localeCompare(b));
                    currentGroupLabel = (gKeys.indexOf(key) + 1) + '조'; break;
                }
            }
            if (isMoving) {
                if (confirm('[' + cleanName + '] 성도는 [' + currentGroupLabel + ']에 있습니다.\n이동시키겠습니까?')) {
                    db.ref().update(updates).then(() => { alert('🎉 이동 완료!'); window.toggleAttendance(cleanName); });
                }
            } else {
                let tArr = allMembersObj[targetGroupKey] ? [...allMembersObj[targetGroupKey]] : [];
                tArr.push(cleanName);
                db.ref('members/' + targetGroupKey).set(sortMembers(tArr)).then(() => { alert('🎉 신규 등록 완료!'); window.toggleAttendance(cleanName); });
            }
        };

        function findGroupByName(name) {
            for (let k in allMembersObj) { if ((allMembersObj[k] || []).includes(name)) return k; }
            return null;
        }

        window.deleteMember = function (name, groupKey) {
            if (!groupKey) return;
            if (confirm('🚨 주의!\n[' + name + '] 성도를 조 명단에서 완전히 삭제하시겠습니까?')) {
                let updatedArr = (allMembersObj[groupKey] || []).filter(n => n !== name);
                db.ref('members/' + groupKey).set(updatedArr).then(() => {
                    db.ref('attendance/' + document.getElementById('today-date').value + '/' + DEPT_NAME + '/present_list/' + name).remove();
                    db.ref('global_absentee_reasons_' + DEPT_NAME + '/' + name).remove();
                    alert('🗑️ [' + name + '] 성도 삭제 완료!');
                });
            }
        };
        function renderLists() {
            const container = document.getElementById('members-container'); container.innerHTML = '';
            const keyword = document.getElementById('search-input').value.trim();
            const groupKeys = Object.keys(allMembersObj).sort((a, b) => a.localeCompare(b));
            const addLP = (btn, name, groupKey) => {
                let pressTimer; let isLP = false;
                const sp = () => { isLP = false; pressTimer = setTimeout(() => { isLP = true; deleteMember(name, groupKey || findGroupByName(name)); }, 800); };
                const cp = () => clearTimeout(pressTimer);
                btn.addEventListener('touchstart', sp, { passive: true }); btn.addEventListener('touchend', cp); btn.addEventListener('touchmove', cp, { passive: true });
                btn.addEventListener('mousedown', sp); btn.addEventListener('mouseup', cp); btn.addEventListener('mouseleave', cp);
                btn.onclick = e => { if (isLP) { e.preventDefault(); return; } toggleAttendance(name); if (keyword) document.getElementById('search-input').value = ''; };
            };
            groupKeys.forEach((groupKey, index) => {
                let membersArr = allMembersObj[groupKey] || [];
                const groupNumStr = (index + 1) + '조';
                let filteredMembers = membersArr.filter(name => name.includes(keyword));
                if (keyword && !groupNumStr.includes(keyword) && filteredMembers.length === 0) return;
                const section = document.createElement('div'); section.className = 'bg-white p-2 rounded-xl shadow-sm border border-gray-200 mb-2';
                section.innerHTML = '<div class="flex justify-between items-center mb-2 border-b border-gray-100 pb-2"><h3 class="text-sm font-black text-gray-800 flex items-center gap-1.5 section-title"><span class="w-2 h-4 bg-indigo-500 rounded-full"></span>' + groupNumStr + ' <span class="text-xs text-indigo-400 font-bold ml-auto">' + membersArr.length + '명</span></h3></div>';
                const grid = document.createElement('div'); grid.className = 'grid grid-cols-6 gap-1.5';
                (keyword ? filteredMembers : membersArr).forEach(name => {
                    const isPresent = presentSet.has(name); const btn = document.createElement('button');
                    btn.className = 'member-btn w-full text-center tracking-tight leading-tight ' + (isPresent ? 'status-present' : 'status-absent') + (keyword && name.includes(keyword) ? ' highlight-search' : '');
                    btn.textContent = name; addLP(btn, name, groupKey); grid.appendChild(btn);
                });
                if (!keyword) { const addBtn = document.createElement('button'); addBtn.className = 'member-btn w-full add-btn flex items-center justify-center active:scale-90'; addBtn.textContent = '+'; addBtn.onclick = () => moveOrAddFriend(groupKey); grid.appendChild(addBtn); }
                section.appendChild(grid); container.appendChild(section);
            });
            if (visitorsNew.length > 0 || visitorsRecurring.length > 0) {
                const visSection = document.createElement('div'); visSection.className = 'bg-orange-50 p-2 rounded-xl shadow-sm border border-orange-200 mb-2 mt-4';
                visSection.innerHTML = '<h3 class="text-sm font-black text-orange-800 mb-2 border-b border-orange-200 pb-2">👋 당일 방문자</h3>';
                const visGrid = document.createElement('div'); visGrid.className = 'grid grid-cols-4 gap-1.5';
                visitorsNew.forEach((v, idx) => {
                    const btn = document.createElement('button'); btn.className = 'member-btn w-full text-center status-visitor text-[12px] flex flex-col items-center py-1';
                    const ns = document.createElement('span'); ns.textContent = v.name; const rs = document.createElement('span'); rs.className = 'text-[9px] opacity-80 mt-0.5'; rs.textContent = v.reason;
                    btn.appendChild(ns); btn.appendChild(rs);
                    btn.onclick = () => { if (confirm(v.name + ' 삭제?')) { visitorsNew.splice(idx, 1); db.ref('attendance/' + document.getElementById('today-date').value + '/' + DEPT_NAME + '/visitorsNew').set(visitorsNew); } };
                    visGrid.appendChild(btn);
                });
                visitorsRecurring.forEach((v, idx) => {
                    const btn = document.createElement('button'); btn.className = 'member-btn w-full text-center bg-slate-400 text-white text-[12px]'; btn.textContent = v.name + ' (계속)';
                    btn.onclick = () => { if (confirm(v.name + ' 삭제?')) { visitorsRecurring.splice(idx, 1); db.ref('attendance/' + document.getElementById('today-date').value + '/' + DEPT_NAME + '/visitorsRecurring').set(visitorsRecurring); } };
                    visGrid.appendChild(btn);
                });
                visSection.appendChild(visGrid); container.appendChild(visSection);
            }
            document.getElementById('count-display').innerText = presentSet.size + visitorsNew.length;
        }

        function filterMembers() { renderLists(); }

        window.addVisitor = function (isNew) {
            const name = prompt(isNew ? '🆕 첫 방문자 이름:' : '🔄 계속 방문자 이름 (보고제외):');
            if (!name || name.trim() === '') return;
            const dateStr = document.getElementById('today-date').value;
            if (isNew) { const reason = prompt('[' + name.trim() + '] 방문 사유') || '새친구'; visitorsNew.push({ name: name.trim(), reason }); db.ref('attendance/' + dateStr + '/' + DEPT_NAME + '/visitorsNew').set(visitorsNew); }
            else { visitorsRecurring.push({ name: name.trim() }); db.ref('attendance/' + dateStr + '/' + DEPT_NAME + '/visitorsRecurring').set(visitorsRecurring); }
        };

        window.submitReportDetails = function () {
            const d = document.getElementById('today-date').value;
            currentReportDetails = { preacher: document.getElementById('rep-preacher').value, scripture: document.getElementById('rep-scripture').value, title: document.getElementById('rep-title').value, vicePreacher: document.getElementById('rep-vice-preacher').value };
            db.ref('attendance/' + d + '/report_details_' + DEPT_NAME).set(currentReportDetails);
            db.ref('attendance/' + d + '/' + DEPT_NAME + '/total_snapshot').set(presentSet.size + visitorsNew.length);
            alert('💾 최종 보고서 데이터 저장 완료!');
        };
        window.openReportCenter = function () { document.getElementById('report-modal').style.display = 'flex'; };
        window.closeReportCenter = function () { document.getElementById('report-modal').style.display = 'none'; };
        window.closeReportView = function () { document.getElementById('report-view').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; };

        function getAbsentees() {
            let a = [];
            Object.keys(allMembersObj).forEach(k => { (allMembersObj[k] || []).forEach(n => { if (!presentSet.has(n) && !a.includes(n)) a.push(n); }); });
            return a.sort();
        }

        window.openReasonModalFor = function (name) { currentReasonTarget = name; document.getElementById('reason-target-name').innerText = name + ' 조원'; document.getElementById('reason-select-modal').style.display = 'flex'; };
        window.closeReasonModal = function () { document.getElementById('reason-select-modal').style.display = 'none'; };
        window.setReason = function (type) { db.ref('global_absentee_reasons_' + DEPT_NAME + '/' + currentReasonTarget).set(type); closeReasonModal(); window.openAbsenteeModal(); };
        window.openReasonInput = function (type) {
            let input = prompt('[' + type + '] 내용 입력:');
            if (input !== null && input.trim() !== '') { db.ref('global_absentee_reasons_' + DEPT_NAME + '/' + currentReasonTarget).set('[' + type + '] ' + input.trim()); closeReasonModal(); window.openAbsenteeModal(); }
        };
        window.clearReason = function () { db.ref('global_absentee_reasons_' + DEPT_NAME + '/' + currentReasonTarget).remove(); closeReasonModal(); window.openAbsenteeModal(); };

        window.openAbsenteeModal = function () {
            const lc = document.getElementById('absentee-list-container'); lc.innerHTML = '';
            getAbsentees().forEach(name => {
                const reason = globalAbsenteeReasons[name] || ''; const hasReason = !!reason;
                let badgeHtml = '<span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-200 text-slate-500">미분류</span>';
                let cleanReason = reason;
                if (hasReason) {
                    if (reason === '한국방문') badgeHtml = '<span class="text-[10px] px-2 py-0.5 rounded-full bg-blue-500 text-white">🇰🇷 한국</span>';
                    else if (reason === '타슈켄트 결석') badgeHtml = '<span class="text-[10px] px-2 py-0.5 rounded-full bg-teal-500 text-white">🇺🇿 타슈켄트</span>';
                    else if (reason.startsWith('[기타]')) { badgeHtml = '<span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-500 text-white">📝 기타</span>'; cleanReason = reason.replace('[기타] ', ''); }
                    else if (reason.startsWith('[보고]')) { badgeHtml = '<span class="text-[10px] px-2 py-0.5 rounded-full bg-red-500 text-white font-bold">🚨 보고</span>'; cleanReason = reason.replace('[보고] ', ''); }
                }
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-3 rounded-xl border-2 mb-2 font-bold text-sm active:scale-95 transition-transform ' + (hasReason ? (reason.startsWith('[보고]') ? 'border-red-400 bg-red-50 text-red-900' : 'border-indigo-300 bg-indigo-50 text-indigo-900') : 'border-slate-200 bg-white text-slate-600');
                btn.innerHTML = '<div class="flex justify-between items-center"><span>' + name + '</span>' + badgeHtml + '</div>' + (hasReason ? '<div class="mt-2 text-slate-700 font-medium bg-white p-2 rounded text-[12px] border ' + (reason.startsWith('[보고]') ? 'border-red-200' : 'border-indigo-100') + '">👉 ' + cleanReason + '</div>' : '');
                btn.onclick = () => openReasonModalFor(name); lc.appendChild(btn);
            });
            document.getElementById('absentee-modal').style.display = 'flex';
        };
        window.closeAbsenteeModal = function () { document.getElementById('absentee-modal').style.display = 'none'; };
        function updateAbsenteeBadge() { let c = 0; getAbsentees().forEach(n => { if (globalAbsenteeReasons[n]) c++; }); document.getElementById('absentee-count-badge').innerText = c + '명 완료'; }

        function extractRoleAndName(fullName) {
            let name = fullName; let role = 'member';
            if (fullName.includes('(리더)')) { name = fullName.replace('(리더)', '').trim(); role = 'leader'; }
            else if (fullName.includes('(부리더)')) { name = fullName.replace('(부리더)', '').trim(); role = 'subleader'; }
            return { name, role };
        }

        const getPastCount = async (daysAgo) => {
            let d = new Date(document.getElementById('today-date').value);
            d.setDate(d.getDate() - daysAgo);
            let snap = await db.ref('attendance/' + d.toISOString().split('T')[0] + '/' + DEPT_NAME).once('value');
            let data = snap.val(); if (!data) return null;
            return (data.present_list ? Object.keys(data.present_list).length : 0) + (data.visitorsNew ? data.visitorsNew.length : 0);
        };

        window.generateA4Report = async function () {
            const dateVal = document.getElementById('today-date').value;
            const targetDateStr = dateVal.replace(/-/g, '. ');
            const preacher = currentReportDetails.preacher || '정재호 목사';
            const scripture = currentReportDetails.scripture || '마태복음 25장';
            const title = currentReportDetails.title || '미입력';
            let groupRowsHtml = ''; let totalPresent = presentSet.size + visitorsNew.length;
            const groupKeys = Object.keys(allMembersObj).sort((a, b) => a.localeCompare(b));
            groupKeys.forEach((gKey, index) => {
                const groupNumStr = (index + 1) + '조'; let pList = []; let aList = []; let pCount = 0; let leaderHtml = '-'; let subleaderHtml = '-';
                (allMembersObj[gKey] || []).forEach(fullName => {
                    const isPresent = presentSet.has(fullName); const parsed = extractRoleAndName(fullName); if (isPresent) pCount++;
                    if (parsed.role === 'leader') leaderHtml = isPresent ? '<span class="font-black text-blue-900">' + parsed.name + '</span>' : '<span class="font-medium text-slate-400">(' + parsed.name + ')</span>';
                    else if (parsed.role === 'subleader') subleaderHtml = isPresent ? '<span class="font-bold text-slate-800">' + parsed.name + '</span>' : '<span class="font-medium text-slate-400">(' + parsed.name + ')</span>';
                    else { if (isPresent) pList.push(parsed.name); else aList.push(parsed.name); }
                });
                if (allMembersObj[gKey].length > 0) groupRowsHtml += '<tr><td class="font-black text-slate-800 bg-slate-50">' + groupNumStr + '</td><td class="text-sm">' + leaderHtml + '</td><td class="text-sm">' + subleaderHtml + '</td><td class="font-black text-blue-700">' + pCount + '명</td><td class="text-left text-slate-800 font-bold">' + (pList.join(', ') || '-') + '</td><td class="text-left text-red-500 font-medium">' + (aList.join(', ') || '-') + '</td></tr>';
            });
            const visHtml = visitorsNew.map(v => v.name + '(' + v.reason + ')').join(', ') || '없음';
            let absTexts = []; getAbsentees().forEach(name => { let r = globalAbsenteeReasons[name]; if (r) { let clean = r.replace('[기타] ', '').replace('[보고] ', ''); absTexts.push('[' + name + '] ' + clean); } });
            let absReasonHtml = absTexts.length > 0 ? absTexts.join(' / ') : "<span class='text-red-400'>작성된 결석/특이 사유가 없습니다.</span>";
            const html = '<div class="border-b-4 border-blue-900 pb-3 mb-6 flex justify-between items-end"><div><h1 class="text-3xl font-black text-blue-950 tracking-tighter">푸른 청년부 예배 및 출석 보고서</h1><p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Tashkent Korean Church</p></div><div class="text-xl font-black text-blue-950">' + targetDateStr + '</div></div><div class="grid grid-cols-12 gap-6 mb-8"><div class="col-span-6 flex flex-col gap-4"><div><h2 class="text-[15px] font-black text-blue-950 mb-2 border-b-2 border-blue-900 pb-1">I. 예배 정보</h2><table class="w-full text-[13px] border border-slate-300"><tbody><tr class="border-b border-slate-300"><th class="w-1/4 bg-slate-100 py-2 text-slate-600 font-bold border-r border-slate-300">인도</th><td class="pl-3 font-bold text-slate-800">' + preacher + '</td></tr><tr class="border-b border-slate-300"><th class="bg-slate-100 py-2 text-slate-600 font-bold border-r border-slate-300">본문</th><td class="pl-3 font-bold text-slate-800">' + scripture + '</td></tr><tr><th class="bg-slate-100 py-2 text-slate-600 font-bold border-r border-slate-300">제목</th><td class="pl-3 font-bold text-slate-800">' + title + '</td></tr></tbody></table></div><div class="border border-slate-200 rounded-lg p-3 bg-slate-50 flex-1"><p class="font-black text-green-700 text-[12px] mb-1">🌱 방문자 및 새친구</p><p class="font-bold text-slate-800 text-[13px] mb-4">' + visHtml + '</p><p class="font-black text-orange-600 text-[12px] mb-1">📝 특이사항 및 결석사유</p><div class="bg-red-50 text-red-800 p-2 rounded text-[12px] font-bold">' + absReasonHtml + '</div></div></div><div class="col-span-6 flex flex-col"><div class="bg-[#243c7c] rounded-xl p-4 flex justify-between items-center shadow-md mb-4"><div><p class="text-blue-200 text-[10px] font-bold uppercase tracking-wider">Total Attendance</p><p class="text-lg font-black text-white mt-1">총 출석 인원</p></div><div class="text-right"><span class="text-4xl font-black text-white">' + totalPresent + '</span><span class="text-sm font-bold text-blue-200 ml-1">명</span></div></div><div class="border border-slate-200 rounded-xl p-3 bg-white mt-auto"><p class="text-[12px] font-black text-slate-700 mb-2">📊 최근 4주 출석 추이</p><div class="relative w-full" style="height:110px;"><canvas id="trendChart"></canvas></div></div></div></div><h2 class="text-[15px] font-black text-blue-950 mb-2 border-b-2 border-blue-900 pb-1">II. 상세 출석 명단</h2><table class="w-full text-[12px] border-t-2 border-blue-900 dense-table"><thead><tr><th>조</th><th>리더 👑</th><th>부리더 👑</th><th>출석인원</th><th>조원 출석 ✅</th><th>조원 결석 ❌</th></tr></thead><tbody>' + groupRowsHtml + '</tbody></table>';
            document.getElementById('a4-content').innerHTML = html;
            closeReportCenter(); document.getElementById('main-app').style.display = 'none'; document.getElementById('report-view').style.display = 'block';
            let w1 = await getPastCount(7) ?? 36; let w2 = await getPastCount(14) ?? 33; let w3 = await getPastCount(21) ?? 38;
            setTimeout(() => {
                scaleReport();
                const ctx = document.getElementById('trendChart').getContext('2d');
                new Chart(ctx, { type: 'bar', data: { labels: ['3주전', '2주전', '지난주', '이번주'], datasets: [{ data: [w3, w2, w1, totalPresent], backgroundColor: ['#cbd5e1', '#cbd5e1', '#cbd5e1', '#4f46e5'], borderRadius: 4, barPercentage: .6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, min: 0 }, x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } } }, animation: { onComplete: function () { const ci = this; const ctx = ci.ctx; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.font = 'bold 11px "Noto Sans KR"'; ci.data.datasets[0].data.forEach(function (val, i) { const meta = ci.getDatasetMeta(0); const bar = meta.data[i]; ctx.fillStyle = i === 3 ? '#312e81' : '#64748b'; ctx.fillText(val, bar.x, bar.y - 4); }); } } } });
            }, 100);
        };

        function fillReportInputs() { document.getElementById('rep-preacher').value = currentReportDetails.preacher || ''; document.getElementById('rep-scripture').value = currentReportDetails.scripture || ''; document.getElementById('rep-title').value = currentReportDetails.title || ''; document.getElementById('rep-vice-preacher').value = currentReportDetails.vicePreacher || ''; }
        function scaleReport() { const container = document.getElementById('report-container'); const page = document.getElementById('a4-content'); const w = container.clientWidth; if (w < 820) { const scale = w / 820; page.style.transform = 'scale(' + scale + ')'; page.style.transformOrigin = 'top center'; container.style.height = (1123 * scale + 40) + 'px'; } else { page.style.transform = 'none'; container.style.height = 'auto'; } }
        function checkServerStatus() { document.getElementById('db-status').innerText = '🟢 서버 연동 완료! (' + (allMembersObj[Object.keys(allMembersObj)[0]]?.length || 0) + '명 로드됨)'; document.getElementById('db-status').className = 'text-[11px] font-bold text-green-600 mt-2 text-center'; }
        window.addEventListener('resize', () => { if (document.getElementById('report-view').style.display === 'block') scaleReport(); });
    </script>
