<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⛪ 대예배 출석부 V7.7 (완벽동기화판)</title>
    
    <link rel="manifest" href="manifest.json?v=999">
    <link rel="apple-touch-icon" href="logo.png?v=999">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        .member-btn { transition: transform 0.1s ease; border-radius: 0.5rem; padding-top: 0.75rem; padding-bottom: 0.75rem; font-size: 15px; font-weight: 900; letter-spacing: -0.5px; user-select: none; -webkit-user-select: none; }
        .member-btn:active { transform: scale(0.92); }
        .status-absent { background-color: #ffffff; color: #475569; border: 1.5px solid #cbd5e1; }
        .status-present { background-color: #2563eb; color: white; border: 1.5px solid #1e3a8a; box-shadow: 0 4px 6px rgba(37,99,235,0.3); }
        .status-visitor { background-color: #ea580c; color: white; border: 1.5px solid #9a3412; }
        .add-btn { background-color: #eff6ff; color: #3b82f6; border: 2px dashed #93c5fd; font-size: 20px !important; }
        
        @media (min-width: 768px) {
            .member-btn { font-size: 20px; padding-top: 1.25rem; padding-bottom: 1.25rem; }
            .add-btn { font-size: 26px !important; }
            #search-input { font-size: 24px; padding: 1.25rem; }
            .section-title { font-size: 22px; }
        }
        
        .highlight-search { animation: pulse-border 1.2s infinite; background-color: #fef08a !important; color: #b45309 !important; border: 2.5px solid #ea580c !important; transform: scale(1.05) !important; z-index: 10 !important; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(234, 88, 12, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0); } }
        
        #report-modal, #absentee-modal, #visitor-modal, #report-view, #reason-select-modal { display: none; }
        
        #report-container { width: 100%; display: flex; justify-content: center; overflow-x: hidden; }
        .a4-page { width: 794px !important; min-width: 794px !important; max-width: 794px !important; min-height: 1123px; background: white; padding: 40px 50px; box-sizing: border-box; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin: 0 auto; transform-origin: top center; }
        
        .tkc-blue { color: #1e3a8a; } .tkc-blue-border { border-color: #1e3a8a; }
        
        .dense-table th, .dense-table td { padding: 8px 6px; border: 1px solid #64748b; word-break: keep-all;}
        .dense-table th { background-color: #f1f5f9; color: #334155; font-weight: 900; }
        
        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            #main-app, #report-modal, #absentee-modal, #visitor-modal, #reason-select-modal, .no-print { display: none !important; }
            #report-view { display: block !important; padding: 0; background: white; }
            #report-container { height: auto !important; }
            .a4-page { box-shadow: none; width: 100% !important; max-width: 100% !important; padding: 10mm; transform: none !important; margin: 0 !important; }
        }
    </style>
</head>
<body class="pb-28 text-slate-800">

    <div id="main-app">
        <!-- 상단 헤더 -->
        <div class="bg-white shadow-sm px-3 py-3 border-b-4 border-blue-700 sticky top-0 z-30">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-lg font-black text-blue-900 tracking-tight section-title">⛪ 대예배 출석부 V7.7</h1>
                <input type="date" id="today-date" class="text-sm font-bold text-gray-700 bg-gray-100 px-2 py-1 rounded border border-gray-300 outline-none">
            </div>
            
            <div class="flex bg-slate-100 p-1.5 rounded-xl mb-3 border border-slate-200">
                <button id="mode-btn-1" onclick="setMode(1)" class="flex-1 py-3 text-base font-black rounded-lg shadow-sm bg-white text-blue-700 transition-all border border-blue-200 section-title">☀️ 1부 예배</button>
                <button id="mode-btn-2" onclick="setMode(2)" class="flex-1 py-3 text-base font-bold rounded-lg text-slate-500 transition-all section-title">☁️ 2부 예배</button>
            </div>

            <div>
                <input type="text" id="search-input" onkeyup="filterMembers()" class="w-full border-2 border-blue-400 rounded-xl p-3 text-lg font-black shadow-sm focus:outline-none focus:border-blue-600 text-center text-blue-900 placeholder-blue-300" placeholder="🔍 전교인 통합 검색">
            </div>
            <p id="db-status" class="text-[11px] font-bold text-orange-500 mt-2 text-center">🟡 시스템 가동 준비 중...</p>
        </div>

        <div id="members-container" class="p-2 space-y-3 bg-slate-50"></div>

        <!-- 하단 바 -->
        <div class="fixed bottom-0 left-0 w-full bg-white border-t-2 border-slate-200 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-40 flex justify-between items-center shrink-0 pb-6">
            <div class="pl-2 leading-none flex-1">
                <p class="text-xs font-bold text-gray-500 mb-1"><span id="current-mode-label">1부</span> 출석현황</p>
                <p class="text-3xl font-black text-blue-700"><span id="count-display">0</span><span class="text-sm text-gray-600 font-bold ml-1">명</span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="openReportCenter()" class="bg-indigo-600 text-white px-5 py-3 rounded-xl font-black text-sm shadow-lg active:scale-95 section-title">📑 4대장 보고서 작성</button>
            </div>
        </div>
    </div>

    <!-- 방문자 모달 -->
    <div id="visitor-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-black text-orange-700 mb-4">👋 방문자 추가</h2>
            <input type="text" id="vis-name" placeholder="이름 입력" class="w-full border-2 border-orange-300 rounded-lg p-3 text-lg font-bold mb-3 outline-none focus:border-orange-500">
            <label class="flex items-center gap-2 bg-orange-50 p-3 rounded-lg border border-orange-200 mb-3 cursor-pointer">
                <input type="checkbox" id="vis-isnew" class="w-5 h-5 accent-orange-600" checked onchange="document.getElementById('vis-reason').style.display = this.checked ? 'block' : 'none'">
                <span class="font-bold text-orange-900 text-sm">🆕 오늘 처음 오신 새가족입니까?</span>
            </label>
            <input type="text" id="vis-reason" placeholder="방문 사유 (예: 출장, 친지 방문)" class="w-full border border-slate-300 rounded-lg p-3 text-sm font-bold mb-5 outline-none">
            <div class="flex gap-2">
                <button onclick="document.getElementById('visitor-modal').style.display='none'" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-black active:scale-95">취소</button>
                <button onclick="saveVisitor()" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-black shadow-lg active:scale-95">등록하기</button>
            </div>
        </div>
    </div>

    <!-- 보고서 센터 모달 -->
    <div id="report-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl border-t-8 border-indigo-600 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-black text-indigo-900 tracking-tight">🗂️ 보고서 센터</h2><button onclick="closeReportCenter()" class="text-gray-400 font-bold text-xl">&times;</button></div>
            <div class="space-y-2 mb-6 bg-slate-50 p-3 rounded-lg border border-slate-200">
                <input type="text" id="rep-preacher" value="이수정 담임목사" placeholder="설교자" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <input type="text" id="rep-scripture" placeholder="말씀 본문" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <input type="text" id="rep-title" placeholder="설교 제목" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <input type="text" id="rep-pray" placeholder="대표 기도자" class="w-full border border-slate-300 rounded p-2 text-sm font-bold outline-none">
                <textarea id="rep-note" placeholder="특이사항 요약..." class="w-full border border-slate-300 rounded p-2 text-sm font-bold h-16 outline-none resize-none"></textarea>
            </div>
            
            <button onclick="openAbsenteeModal()" class="w-full bg-orange-100 text-orange-700 border border-orange-300 py-3 rounded-xl font-black text-sm mb-6 active:scale-95 flex justify-between px-4 items-center shadow-sm">
                <span>✍️ 장년부 결석자 분류 (1~4번)</span><span id="absentee-count-badge" class="bg-orange-500 text-white px-2 py-0.5 rounded-full text-xs">0명</span>
            </button>
            
            <div class="space-y-2">
                <button onclick="generateReport(1)" class="w-full bg-blue-700 text-white py-3 rounded-xl font-black text-sm shadow active:scale-95 text-left px-4">1. 📊 예배 종합 보고서 (대시보드)</button>
                <button onclick="generateReport(2)" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-sm shadow active:scale-95 text-left px-4">2. ✅ 대예배 상세 출석부 (1부/2부)</button>
                <button onclick="generateReport(3)" class="w-full bg-teal-600 text-white py-3 rounded-xl font-black text-sm shadow active:scale-95 text-left px-4">3. 🌐 전교인 통합 출석부 (전체 부서)</button>
                <button onclick="generateReport(4)" class="w-full bg-red-600 text-white py-3 rounded-xl font-black text-sm shadow active:scale-95 text-left px-4">4. 🚨 특별 사유 및 심방 보고서</button>
            </div>
        </div>
    </div>

    <!-- 결석자 관리 메인 모달 -->
    <div id="absentee-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-5 shadow-2xl flex flex-col h-[80vh]">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-black text-orange-700">✍️ 결석자 사유 (영구기억)</h2>
                <button onclick="closeAbsenteeModal()" class="text-gray-500 font-bold bg-gray-100 px-3 py-1 rounded-lg text-sm">닫기</button>
            </div>
            <p class="text-[11px] text-slate-500 mb-2 leading-tight">이름을 클릭하여 1~4번 사유를 분류하세요.<br>※ '4.특별보고' 작성자만 마지막 보고서에 출력됩니다.</p>
            <div id="absentee-list-container" class="overflow-y-auto flex-1 space-y-2 bg-slate-50 p-2 rounded-lg border border-slate-200"></div>
        </div>
    </div>

    <!-- 🚀 1,2,3,4번 사유 선택 팝업 -->
    <div id="reason-select-modal" class="fixed inset-0 bg-black bg-opacity-75 z-[60] flex justify-center items-end p-0 sm:items-center sm:p-4">
        <div class="bg-white w-full max-w-sm rounded-t-3xl sm:rounded-2xl p-6 shadow-2xl pb-10 sm:pb-6 transform transition-transform">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black text-indigo-900" id="reason-target-name">홍길동</h2>
                <button onclick="closeReasonModal()" class="bg-gray-100 text-gray-500 px-3 py-1 rounded-lg font-bold text-sm">닫기</button>
            </div>
            <p class="text-xs text-gray-500 font-bold mb-4">해당 성도의 결석 사유를 분류해주세요.</p>
            <div class="space-y-2">
                <button onclick="setReason('한국방문')" class="w-full bg-blue-50 border border-blue-200 text-blue-800 py-3 rounded-xl font-black text-left px-4 flex justify-between active:scale-95"><span>1. 🇰🇷 한국 방문</span><span class="text-xs text-blue-500 font-normal mt-0.5">상태 고정</span></button>
                <button onclick="setReason('타슈켄트 결석')" class="w-full bg-teal-50 border border-teal-200 text-teal-800 py-3 rounded-xl font-black text-left px-4 flex justify-between active:scale-95"><span>2. 🇺🇿 타슈켄트 결석</span><span class="text-xs text-teal-500 font-normal mt-0.5">상태 고정</span></button>
                <button onclick="openReasonInput('기타')" class="w-full bg-slate-50 border border-slate-300 text-slate-700 py-3 rounded-xl font-black text-left px-4 flex justify-between active:scale-95"><span>3. 📝 기타 사유</span><span class="text-xs text-slate-400 font-normal mt-0.5">단순 메모</span></button>
                <button onclick="openReasonInput('보고')" class="w-full bg-red-50 border border-red-200 text-red-700 py-3 rounded-xl font-black text-left px-4 flex justify-between active:scale-95"><span>4. 🚨 특별 보고</span><span class="text-xs text-red-500 font-bold mt-0.5">보고서 출력</span></button>
            </div>
            <button onclick="clearReason()" class="w-full mt-4 bg-gray-200 text-gray-600 py-3 rounded-xl font-black text-sm active:scale-95">🗑️ 기존 분류 지우기 (초기화)</button>
        </div>
    </div>

    <!-- 인쇄용 뷰 -->
    <div id="report-view" class="bg-gray-200 min-h-screen py-8 w-full overflow-y-auto overflow-x-hidden">
        <div class="text-center mb-6 no-print flex gap-3 justify-center w-full px-4">
            <button onclick="closeReportView()" class="flex-1 max-w-[200px] bg-slate-700 text-white py-3 rounded-xl font-black shadow-lg active:scale-95 text-lg">🔙 뒤로가기</button>
            <button onclick="window.print()" class="flex-1 max-w-[200px] bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg active:scale-95 text-lg">🖨️ 인쇄하기</button>
        </div>
        <div id="report-container">
            <div class="a4-page relative" id="a4-content"></div>
        </div>
    </div>

    <script>
        const historyData = { '1부': [52, 50, 59], '2부': [114, 96, 94], '청년부': [38, 33, 36], '중고등부': [59, 53, 55], '유초등부': [32, 30, 29], '유치부': [4, 3, 4] };
        const firebaseConfig = { databaseURL: "https://tashkent-church-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        let currentMode = 1; 
        let presentSet1 = new Set(); let presentSet2 = new Set(); 
        let allMembersData = {}; 
        let allMembersFlatList = []; 
        let visitors = []; 
        let globalAbsenteeReasons = {}; 
        let chartInstance = null;
        let todaySnapshotTotal = 0;
        let currentReasonTarget = "";

        const displayGroups1 = [{ key: '1부_직분자', label: '1부 직분자' }, { key: '1부_등록교인', label: '1부 등록교인' }, { key: '청년부', label: '청년부' }, { key: '미등록교인', label: '미등록 교인' }, { key: '미분류_교인', label: '미분류 교인' }];
        const displayGroups2 = [{ key: '2부_직분자', label: '2부 직분자' }, { key: '2부_등록교인', label: '2부 등록교인' }, { key: '청년부', label: '청년부' }, { key: '미등록교인', label: '미등록 교인' }, { key: '미분류_교인', label: '미분류 교인' }];
        const adultGroupsForAbsentees = ['1부_직분자', '1부_등록교인', '2부_직분자', '2부_등록교인', '미등록교인', '미분류_교인'];

        function initApp() {
            document.getElementById('today-date').value = new Date().toISOString().split('T')[0];
            let savedMode = localStorage.getItem('tkc_dae_mode');
            if(savedMode) currentMode = parseInt(savedMode);

            db.ref('members').on('value', (snap) => {
                const data = snap.val() || {}; let processed = {}; allMembersFlatList = [];
                for(let k in data) { 
                    processed[k] = data[k] ? (Array.isArray(data[k]) ? [...data[k]] : Object.values(data[k])) : []; 
                    allMembersFlatList.push(...processed[k]); 
                }
                allMembersData = processed;
                allMembersFlatList = [...new Set(allMembersFlatList)]; 
                document.getElementById('db-status').innerHTML = "🟢 실시간 서버 연동 완료!"; document.getElementById('db-status').className = "text-[11px] font-bold text-green-600 mt-2 text-center";
                setMode(currentMode);
            });

            db.ref('global_absentee_reasons').on('value', snap => {
                globalAbsenteeReasons = snap.val() || {};
                updateAbsenteeBadge();
            });

            loadAttendanceData();
            document.getElementById('today-date').addEventListener('change', loadAttendanceData);
        }

        function setMode(mode) {
            currentMode = mode;
            localStorage.setItem('tkc_dae_mode', mode); 
            document.getElementById('mode-btn-1').className = mode === 1 ? "flex-1 py-3 text-base font-black rounded-lg shadow-sm bg-white text-blue-700 transition-all border border-blue-200 section-title" : "flex-1 py-3 text-base font-bold rounded-lg text-slate-500 transition-all bg-transparent section-title";
            document.getElementById('mode-btn-2').className = mode === 2 ? "flex-1 py-3 text-base font-black rounded-lg shadow-sm bg-white text-blue-700 transition-all border border-blue-200 section-title" : "flex-1 py-3 text-base font-bold rounded-lg text-slate-500 transition-all bg-transparent section-title";
            document.getElementById('current-mode-label').innerText = mode + "부";
            renderLists();
        }

        function loadAttendanceData() {
            const dateStr = document.getElementById('today-date').value;
            db.ref('attendance/' + dateStr + '/대예배').off(); 
            
            db.ref('attendance/' + dateStr + '/대예배').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                presentSet1.clear(); presentSet2.clear(); visitors = [];
                
                if(data['1부'] && data['1부'].present) Object.keys(data['1부'].present).forEach(n => presentSet1.add(n));
                if(data['2부'] && data['2부'].present) Object.keys(data['2부'].present).forEach(n => presentSet2.add(n));
                if(data.visitors) visitors = data.visitors;
                
                renderLists(); 
            });
        }

        window.toggleAttendance = function(name) {
            const dateStr = document.getElementById('today-date').value;
            const currentSet = currentMode === 1 ? presentSet1 : presentSet2;
            const isPresent = currentSet.has(name);
            db.ref(`attendance/${dateStr}/대예배/${currentMode}부/present/${name}`).set(isPresent ? null : true);
            
            if(!isPresent) db.ref(`global_absentee_reasons/${name}`).remove();
        }

        window.moveOrAddMember = function(targetGroupKey, targetGroupLabel) {
            const name = prompt(`[${targetGroupLabel}] 부서에 영구 등록할 성도 이름:`);
            if(!name || name.trim() === "") return; const cleanName = name.trim();
            let updates = {};
            for(let key in allMembersData) { if(key === targetGroupKey) continue; let arr = allMembersData[key] || []; if(arr.includes(cleanName)) updates['members/' + key] = arr.filter(n => n !== cleanName); }
            let targetArr = allMembersData[targetGroupKey] ? [...allMembersData[targetGroupKey]] : [];
            if(!targetArr.includes(cleanName)) { targetArr.push(cleanName); targetArr.sort(); }
            updates['members/' + targetGroupKey] = targetArr;
            db.ref().update(updates).then(() => { toggleAttendance(cleanName); alert(`🎉 [${cleanName}] 님 영구 등록 완료!`); document.getElementById('search-input').value = ""; });
        };

        function findGroupByName(name) {
            for (let k in allMembersData) {
                if ((allMembersData[k] || []).includes(name)) return k;
            }
            return null;
        }

        window.deleteMember = function(name, groupKey) {
            if(!groupKey) return;
            if(confirm(`🚨 주의!\n[${name}] 성도를 명단에서 완전히 삭제하시겠습니까?\n(오타를 지우거나 교회를 떠나신 분만 삭제하세요)`)) {
                let targetArr = allMembersData[groupKey] || [];
                let updatedArr = targetArr.filter(n => n !== name);
                
                db.ref('members/' + groupKey).set(updatedArr).then(() => {
                    db.ref(`attendance/${document.getElementById('today-date').value}/대예배/1부/present/${name}`).remove();
                    db.ref(`attendance/${document.getElementById('today-date').value}/대예배/2부/present/${name}`).remove();
                    db.ref(`global_absentee_reasons/${name}`).remove();
                    alert(`🗑️ [${name}] 성도 명단 삭제 완료!`);
                });
            }
        };

        function renderLists() {
            const container = document.getElementById('members-container'); container.innerHTML = '';
            const keyword = document.getElementById('search-input').value.trim();
            const activeGroups = currentMode === 1 ? displayGroups1 : displayGroups2;

                        <tr><td class="bg-gray-50 font-black">청년부</td><td class="text-left">${p1_youth||'-'}</td><td class="text-left">${p2_youth||'-'}</td></tr>
                        <tr><td class="bg-gray-50 font-black">방문자</td><td class="text-left">${v1_str||'-'}</td><td class="text-left">${v2_str||'-'}</td></tr>
                        <tr class="bg-blue-50 font-black text-blue-900 text-[15px]"><td>총계</td><td>${total1} 명</td><td>${total2} 명</td></tr>
                        <tr><td class="bg-gray-50 font-black">결석자</td><td colspan="2" class="text-left text-red-600 font-bold leading-loose">${absRows}</td></tr>
                    </tbody>
                </table>`;
            } else if (type === 3) {
                // 🚨 3번 통합 출석부 (결석자 & 부서 연동 완벽 수정)
                html = `
                <div class="flex justify-between items-end border-b-4 tkc-blue-border pb-2 mb-4">
                    <div><h1 class="text-3xl font-black tkc-blue tracking-tighter">전교인 통합 출석 명단</h1></div>
                    <div class="text-right"><p class="text-xl font-black tkc-blue tracking-tight">${targetDate}</p></div>
                </div>
                <p class="text-center text-blue-600 font-bold my-10">데이터 집계 중입니다...</p>`;
                
                setTimeout(async () => { 
                    const dateStr = document.getElementById('today-date').value;
                    const snapAll = await db.ref('attendance/' + dateStr).once('value'); 
                    const dataAll = snapAll.val() || {}; let tbodyHtml3 = ""; let totalAllDepts = 0;
                    
                    const mainAbsentees = getAdultAbsentees();

                    // 1부 데이터 파싱
                    let pNames1 = [], v1_rep = [];
                    if(dataAll['대예배'] && dataAll['대예배']['1부']) pNames1 = Object.keys(dataAll['대예배']['1부'].present || {});
                    if(dataAll['대예배'] && dataAll['대예배'].visitors) v1_rep = dataAll['대예배'].visitors.filter(v=>v.service===1).map(v=>`[방]${v.name}`);
                    let count1 = pNames1.length + v1_rep.length;
                    pNames1.push(...v1_rep);
                    totalAllDepts += count1;

                    // 2부 데이터 파싱
                    let pNames2 = [], v2_rep = [];
                    if(dataAll['대예배'] && dataAll['대예배']['2부']) pNames2 = Object.keys(dataAll['대예배']['2부'].present || {});
                    if(dataAll['대예배'] && dataAll['대예배'].visitors) v2_rep = dataAll['대예배'].visitors.filter(v=>v.service===2).map(v=>`[방]${v.name}`);
                    let count2 = pNames2.length + v2_rep.length;
                    pNames2.push(...v2_rep);
                    totalAllDepts += count2;

                    // 🚨 1부/2부 병합 및 결석자 표기
                    tbodyHtml3 += `
                        <tr class="border-b border-slate-300">
                            <td class="py-2 px-2 bg-slate-50 border-r border-slate-300 w-[12%] text-center font-black text-slate-700">1부(대예배)</td>
                            <td class="py-2 px-2 border-r border-slate-300 w-[8%] text-center font-black text-blue-700">${count1}명</td>
                            <td class="py-2 px-2 border-r border-slate-300 w-[50%] leading-relaxed text-[12px] text-blue-800 font-bold break-words text-left">${pNames1.sort().join(', ') || '-'}</td>
                            <td rowspan="2" class="py-2 px-2 w-[30%] leading-relaxed text-[12px] text-red-500 font-medium break-words text-left align-top">${mainAbsentees.length > 0 ? mainAbsentees.join(', ') : '-'}</td>
                        </tr>
                        <tr class="border-b border-slate-300">
                            <td class="py-2 px-2 bg-slate-50 border-r border-slate-300 w-[12%] text-center font-black text-slate-700">2부(대예배)</td>
                            <td class="py-2 px-2 border-r border-slate-300 w-[8%] text-center font-black text-blue-700">${count2}명</td>
                            <td class="py-2 px-2 border-r border-slate-300 w-[50%] leading-relaxed text-[12px] text-blue-800 font-bold break-words text-left">${pNames2.sort().join(', ') || '-'}</td>
                        </tr>
                    `;

                    // 부서 데이터 파싱
                    const depts = ['청년부', '중고등부', '유초등부', '유치부']; 
                    for (const dept of depts) { 
                        let count=0, pNames=[], aNames=[];
                        if(dataAll[dept]) { 
                            count = dataAll[dept].total_snapshot || 0;
                            // V7.2 구조 대응 (present_list)
                            if(dataAll[dept].present_list) {
                                pNames = Object.keys(dataAll[dept].present_list);
                                if(dataAll[dept].visitorsNew) pNames.push(...dataAll[dept].visitorsNew.map(v=>`[방]${v.name}`));
                            } else if(dataAll[dept].present) { // 구버전 fallback
                                pNames = Object.keys(dataAll[dept].present);
                            } else if(count > 0) {
                                pNames = ["*장부 참조(명단미제출)"];
                            } else {
                                pNames = ["-"];
                            }
                            
                            // 부서별 결석자 DB에서 자동 로딩
                            const absSnap = await db.ref(`attendance/${dateStr}/absentees_${dept}`).once('value');
                            const absData = absSnap.val();
                            if(absData) {
                                aNames = Object.keys(absData);
                            } else {
                                aNames = ["*장부 참조(명단미제출)"];
                            }
                        } else {
                            pNames = ["-"]; aNames = ["-"];
                        }
                        totalAllDepts += count; 
                        
                        tbodyHtml3 += `
                        <tr class="border-b border-slate-300">
                            <td class="py-2 px-2 bg-slate-50 border-r border-slate-300 text-center font-black text-slate-700">${dept}</td>
                            <td class="py-2 px-2 border-r border-slate-300 text-center font-black text-blue-700">${count}명</td>
                            <td class="py-2 px-2 border-r border-slate-300 leading-relaxed text-[12px] text-blue-800 font-bold break-words text-left">${pNames.sort().join(', ') || '-'}</td>
                            <td class="py-2 px-2 leading-relaxed text-[12px] text-red-500 font-medium break-words text-left">${aNames.sort().join(', ') || '-'}</td>
                        </tr>`; 
                    } 
                    
                    const finalHtml = `
                    <div class="text-right font-black text-blue-900 text-[15px] mb-2">전교인 총 출석: ${totalAllDepts}명</div>
                    <table class="w-full border-2 border-slate-800 text-[13px] mb-6 dense-table">
                        <thead class="bg-gray-100 font-black text-center border-b border-black"><tr><th>부서</th><th>출석수</th><th class="text-blue-700">출석자 명단 ✅</th><th class="text-red-600">결석자 명단 ❌</th></tr></thead>
                        <tbody class="text-left font-bold text-slate-800">${tbodyHtml3}</tbody>
                    </table>`;
                    document.getElementById('a4-content').innerHTML = html.replace('<p class="text-center text-blue-600 font-bold my-10">데이터 집계 중입니다...</p>', finalHtml); 
                    scaleReport(); 
                }, 200);
            } else if (type === 4) {
                const absentees = getAdultAbsentees();
                let tbody = absentees.map(name => {
                    const r = globalAbsenteeReasons[name];
                    if(r && r.startsWith('[보고]')) {
                        const cleanReason = r.replace('[보고]', '').trim();
                        return `<tr class="border-b border-slate-300"><td class="py-4 px-4 bg-red-50 border-r border-slate-300 w-32 text-center font-black text-red-900 text-base">${name}</td><td class="py-4 px-4 leading-relaxed font-bold text-slate-800">${cleanReason}</td></tr>`;
                    }
                    return "";
                }).join(''); 
                
                if(!tbody) tbody = `<tr><td colspan="2" class="py-10 text-center font-bold text-gray-400">이번 주 특별 심방/보고 대상자가 없습니다.</td></tr>`; 
                
                html = `<div class="flex justify-between items-end border-b-4 border-red-600 pb-3 mb-8"><div><h1 class="text-4xl font-black text-red-700 tracking-tighter">특별 사유 및 심방 보고</h1><p class="text-xs font-bold text-gray-400 mt-1 uppercase">Tashkent Korean Church</p></div><div class="text-right"><p class="text-2xl font-black text-red-700 tracking-tight">${targetDate}</p></div></div><table class="w-full border-2 border-red-800 text-sm mb-6"><thead><tr class="bg-red-100 border-b-2 border-red-800 text-red-900"><th class="py-3 border-r border-red-300">성 명</th><th class="py-3">특별 보고 및 심방 내용</th></tr></thead><tbody class="text-left font-bold text-slate-800">${tbody}</tbody></table>`;
            }

            document.getElementById('a4-content').innerHTML = html;
            closeReportCenter(); document.getElementById('main-app').style.display = 'none'; document.getElementById('report-view').style.display = 'block';

            setTimeout(scaleReport, 50);

            if(type === 1 && typeof Chart !== 'undefined') {
                setTimeout(async () => { 
                    const w3 = historyData['1부'][0] + historyData['2부'][0] + historyData['청년부'][0] + historyData['중고등부'][0] + historyData['유초등부'][0] + historyData['유치부'][0]; 
                    const w2 = historyData['1부'][1] + historyData['2부'][1] + historyData['청년부'][1] + historyData['중고등부'][1] + historyData['유초등부'][1] + historyData['유치부'][1]; 
                    const w1 = historyData['1부'][2] + historyData['2부'][2] + historyData['청년부'][2] + historyData['중고등부'][2] + historyData['유초등부'][2] + historyData['유치부'][2]; 
                    
                    const snap = await db.ref('attendance/' + document.getElementById('today-date').value).once('value');
                    const todayData = snap.val() || {};
                    const curGrand = mainTotal + (todayData['청년부']?.total_snapshot||0) + (todayData['중고등부']?.total_snapshot||0) + (todayData['유초등부']?.total_snapshot||0) + (todayData['유치부']?.total_snapshot||0);

                    const ctx = document.getElementById('trendChart').getContext('2d'); 
                    if (chartInstance) chartInstance.destroy(); 
                    
                    chartInstance = new Chart(ctx, { 
                        type: 'bar', 
                        data: { 
                            labels: ['3주전', '2주전', '지난주', '이번주'], 
                            datasets: [{ 
                                data: [w3, w2, w1, curGrand], 
                                backgroundColor: ['#cbd5e1', '#cbd5e1', '#cbd5e1', '#2563eb'], 
                                borderRadius: 4, barPercentage: 0.6
                            }] 
                        }, 
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            layout: { padding: { top: 20 } },
                            plugins: { legend: { display: false } }, 
                            scales: { 
                                y: { display: false, min: 0, suggestedMax: Math.max(350, curGrand + 50) }, 
                                x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } } 
                            }, 
                            animation: { 
                                onComplete: function() { 
                                    const chartInstance = this; const ctx = chartInstance.ctx; 
                                    const meta = chartInstance.getDatasetMeta(0);
                                    const yAxis = chartInstance.scales.y;
                                    
                                    // 🚨 300명 점선 및 텍스트 마법!
                                    if (yAxis.max >= 300) {
                                        const y300 = yAxis.getPixelForValue(300);
                                        ctx.save();
                                        ctx.beginPath();
                                        ctx.setLineDash([5, 5]);
                                        ctx.moveTo(chartInstance.chartArea.left, y300);
                                        ctx.lineTo(chartInstance.chartArea.right, y300);
                                        ctx.lineWidth = 1;
                                        ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)'; 
                                        ctx.stroke();

                                        ctx.fillStyle = 'rgba(239, 68, 68, 0.9)';
                                        ctx.font = 'bold 10px "Noto Sans KR"';
                                        ctx.textAlign = 'right';
                                        ctx.textBaseline = 'bottom';
                                        ctx.fillText('300명', chartInstance.chartArea.right, y300 - 2);
                                        ctx.restore();
                                    }

                                    // 🚨 막대 위 숫자 표시 마법!
                                    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.font = 'bold 13px "Noto Sans KR"'; 
                                    chartInstance.data.datasets[0].data.forEach(function(val, i) { 
                                        const bar = meta.data[i]; 
                                        ctx.fillStyle = i === 3 ? '#1e3a8a' : '#64748b'; 
                                        ctx.fillText(val, bar.x, bar.y - 5); 
                                    }); 
                                } 
                            } 
                        } 
                    }); 
                }, 200); 
            }
        }

        function scaleReport() {
            const container = document.getElementById('report-container'); const page = document.getElementById('a4-content');
            const w = container.clientWidth;
            if(w < 820 && w > 0) { const scale = w / 820; page.style.transform = `scale(${scale})`; page.style.transformOrigin = 'top center'; container.style.height = `${1123 * scale + 40}px`; } 
            else { page.style.transform = 'none'; container.style.height = 'auto'; }
        }

        window.addEventListener('resize', () => { if(document.getElementById('report-view').style.display === 'block') scaleReport(); });
        window.onload = initApp;
    </script>
</body>
</html>
