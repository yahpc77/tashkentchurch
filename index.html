<div id="report-container" class="bg-white p-8 mx-auto max-w-2xl">
  
  <header class="mb-8">
    <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-3">주일 예배 보고서</h1>
    <div class="text-lg text-slate-500 font-medium">타슈켄트 한인교회</div>
    <div class="mt-4 border-b-4 border-slate-800 w-full"></div>
  </header>

  <div class="content-wrapper grid grid-cols-1 gap-10">
    
    <div class="left-col space-y-8">
      
      <section>
        <h2 class="text-2xl font-bold text-slate-800 border-b-2 border-slate-800 pb-3 mb-5">
          Ⅰ. 예배 정보
        </h2>
        
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-600 mb-1">날짜</label>
              <input type="date" value="2025-12-23" 
                     class="w-full text-lg font-medium border-b border-slate-300 focus:outline-none focus:border-blue-500 py-1" />
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-600 mb-1">설교자</label>
              <input type="text" value="이수정 담임목사" 
                     class="w-full text-lg font-medium border-b border-slate-300 focus:outline-none focus:border-blue-500 py-1" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-600 mb-1">성경 본문</label>
            <input type="text" placeholder="예: 요한복음 3:16" 
                   class="w-full text-lg font-medium border-b border-slate-300 focus:outline-none focus:border-blue-500 py-1" />
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-600 mb-1">설교 제목</label>
            <input type="text" placeholder="제목을 입력하세요" 
                   class="w-full text-lg font-medium border-b border-slate-300 focus:outline-none focus:border-blue-500 py-1" />
          </div>
        </div>
      </section>

      <section>
        <h2 class="text-2xl font-bold text-slate-800 border-b-2 border-slate-800 pb-3 mb-5">
          Ⅲ. 상세 보고
        </h2>
        <div class="space-y-4">
          <div class="flex items-start gap-4">
            <label class="w-20 font-bold text-slate-700 pt-1 shrink-0">새가족</label>
            <textarea rows="2" class="w-full bg-slate-50 rounded p-2 text-slate-800 resize-none"></textarea>
          </div>
          <div class="flex items-start gap-4">
            <label class="w-20 font-bold text-slate-700 pt-1 shrink-0">방문자</label>
            <textarea rows="2" class="w-full bg-slate-50 rounded p-2 text-slate-800 resize-none"></textarea>
          </div>
          <div class="flex items-start gap-4">
            <label class="w-20 font-bold text-slate-700 pt-1 shrink-0">특이사항</label>
            <textarea rows="3" class="w-full bg-slate-50 rounded p-2 text-slate-800 resize-none"></textarea>
          </div>
        </div>
      </section>
    </div>

    <div class="right-col">
      <section>
        <h2 class="text-2xl font-bold text-slate-800 border-b-2 border-slate-800 pb-3 mb-5">
          Ⅱ. 출석 현황
        </h2>

        <h3 class="font-bold text-lg text-slate-700 mb-2">1. 대예배</h3>
        <table class="w-full text-center border-collapse mb-6">
          <thead>
            <tr class="bg-slate-100 text-slate-700">
              <th class="border p-2 w-1/6">구분</th>
              <th class="border p-2">남</th>
              <th class="border p-2">여</th>
              <th class="border p-2 w-1/6 font-bold bg-slate-200">소계</th>
            </tr>
          </thead>
          <tbody class="text-lg">
            <tr>
              <td class="border p-3 font-medium">1부</td>
              <td class="border p-3"><input type="number" class="w-full text-center outline-none" placeholder="0"></td>
              <td class="border p-3"><input type="number" class="w-full text-center outline-none" placeholder="0"></td>
              <td class="border p-3 font-bold bg-slate-50 text-blue-900">0</td>
            </tr>
            <tr>
              <td class="border p-3 font-medium">2부</td>
              <td class="border p-3"><input type="number" class="w-full text-center outline-none" placeholder="0"></td>
              <td class="border p-3"><input type="number" class="w-full text-center outline-none" placeholder="0"></td>
              <td class="border p-3 font-bold bg-slate-50 text-blue-900">0</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3" class="border p-3 font-bold text-right bg-slate-50">대예배 합계 :</td>
              <td class="border p-3 font-bold text-xl text-blue-900">0명</td>
            </tr>
          </tfoot>
        </table>

        <h3 class="font-bold text-lg text-slate-700 mb-2">2. 교육부서</h3>
        <div class="grid grid-cols-4 border border-slate-300 text-center mb-8">
          <div class="bg-slate-100 p-2 font-bold border-r border-b">청년부</div>
          <div class="bg-slate-100 p-2 font-bold border-r border-b">중고등부</div>
          <div class="bg-slate-100 p-2 font-bold border-r border-b">유초등부</div>
          <div class="bg-slate-100 p-2 font-bold border-b">유아부</div>
          
          <div class="p-3 border-r"><input type="number" class="w-full text-center outline-none" placeholder="0"></div>
          <div class="p-3 border-r"><input type="number" class="w-full text-center outline-none" placeholder="0"></div>
          <div class="p-3 border-r"><input type="number" class="w-full text-center outline-none" placeholder="0"></div>
          <div class="p-3"><input type="number" class="w-full text-center outline-none" placeholder="0"></div>
        </div>

        <div class="bg-blue-50 rounded-lg p-6 text-right">
          <span class="text-xl font-bold text-slate-700 mr-4">총 출석:</span>
          <span class="text-4xl font-black text-blue-900">0 명</span>
        </div>
      </section>
    </div>

  </div>

  <div class="mt-12 text-right">
    <p class="text-xl font-bold text-slate-800">위와 같이 보고합니다.</p>
    <div class="mt-8 text-lg text-slate-500">
      <span class="mr-2">작성자 :</span>
      <span class="inline-block w-48 border-b border-slate-400"></span>
      <span>(인)</span>
    </div>
  </div>

</div>
